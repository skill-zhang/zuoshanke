<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>坐山客 · 自省地图（树+详情）</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #020617;
  color: #e2e8f0;
  font-family: 'JetBrains Mono', 'Noto Sans SC', monospace;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

header {
  padding: 14px 20px;
  border-bottom: 1px solid #1e293b;
  flex-shrink: 0;
  display: flex; align-items: center; gap: 12px;
}
header h1 { font-size: 16px; font-weight: 600;
  background: linear-gradient(135deg, #22d3ee, #34d399);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
header .sub { font-size: 11px; color: #475569; }

.main { display: flex; flex: 1; overflow: hidden; }

/* ── 左侧树 ── */
#left-panel {
  width: 360px; min-width: 260px;
  border-right: 1px solid #1e293b;
  display: flex; flex-direction: column;
  overflow: hidden;
}
#search-box {
  background: #0f172a; border: none; border-bottom: 1px solid #1e293b;
  padding: 10px 14px; color: #e2e8f0; font-size: 12px;
  font-family: inherit; outline: none; flex-shrink: 0;
}
#search-box::placeholder { color: #475569; }

#tree-scroll {
  flex: 1; overflow-y: auto; padding: 8px 0 20px 16px;
}
#tree-scroll::-webkit-scrollbar { width: 6px; }
#tree-scroll::-webkit-scrollbar-track { background: transparent; }
#tree-scroll::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }

.tree { list-style: none; }
.tree ul { list-style: none; padding-left: 20px; }
.tree li { position: relative; padding: 1px 0; }
.tree li::before {
  content: ''; position: absolute; left: -13px; top: 0; bottom: 50%;
  width: 10px; border-left: 1.5px solid #1e293b; border-bottom: 1.5px solid #1e293b;
  border-radius: 0 0 0 4px;
}
.tree li:last-child::before {
  border-left: 1.5px solid #1e293b; border-bottom: 1.5px solid #1e293b;
  border-radius: 0 0 0 4px;
}
.tree li:last-child::after {
  content: ''; position: absolute; left: -13px; top: 50%; bottom: 0; width: 10px;
}
.tree > li::before { display: none; }
.tree > li::after { display: none; }

.node {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 10px 4px 6px; border-radius: 5px;
  cursor: pointer; transition: all 0.12s;
  border: 1px solid transparent; user-select: none;
  font-size: 12px; line-height: 1.4;
  width: calc(100% - 4px);
}
.node:hover { background: rgba(30,41,59,0.5); border-color: #1e293b; }
.node.selected {
  background: rgba(34,211,238,0.1);
  border-color: rgba(34,211,238,0.3);
}
.node.has-detail { border-left: 2px solid transparent; }
.node.selected.has-detail { border-left-color: #22d3ee; }

.node .icon { font-size: 13px; width: 18px; text-align: center; flex-shrink: 0; }
.node .label { color: #e2e8f0; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.node .sublabel {
  font-size: 10px; color: #475569;
  margin-left: auto; white-space: nowrap; overflow: hidden;
  text-overflow: ellipsis; max-width: 100px;
}
.toggle {
  display: inline-flex; align-items: center; justify-content: center;
  width: 14px; height: 14px; font-size: 8px; color: #475569;
  transition: transform 0.2s; flex-shrink: 0;
}
.toggle.expanded { transform: rotate(90deg); }
.toggle.empty { visibility: hidden; }

/* ── 右侧详情面板 ── */
#detail-panel {
  width: 0; overflow: hidden;
  display: flex; flex-direction: column;
  transition: width 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  background: #0a0f1e;
  border-left: 1px solid #1e293b;
}
#detail-panel.open { width: 400px; min-width: 320px; }

#detail-inner {
  width: 400px; min-width: 320px;
  flex: 1; overflow-y: auto; padding: 20px;
}
#detail-inner::-webkit-scrollbar { width: 6px; }
#detail-inner::-webkit-scrollbar-track { background: transparent; }
#detail-inner::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }

/* Detail content */
.d-header {
  display: flex; align-items: center; gap: 10px;
  padding-bottom: 14px; border-bottom: 1px solid #1e293b; margin-bottom: 16px;
}
.d-icon { font-size: 28px; width: 40px; text-align: center; }
.d-title-group { flex: 1; }
.d-title { font-size: 16px; font-weight: 600; }
.d-sub { font-size: 12px; color: #64748b; margin-top: 2px; }
.d-close {
  background: none; border: none; color: #475569; font-size: 16px;
  cursor: pointer; padding: 4px; border-radius: 4px;
}
.d-close:hover { color: #e2e8f0; background: rgba(255,255,255,0.05); }

.d-section { margin-bottom: 16px; }
.d-section h3 {
  font-size: 10px; color: #475569; text-transform: uppercase;
  letter-spacing: 1px; margin-bottom: 6px;
}
.d-desc { font-size: 13px; color: #94a3b8; line-height: 1.7; }

.d-table { width: 100%; font-size: 12px; border-collapse: collapse; }
.d-table td {
  padding: 6px 8px; border-bottom: 1px solid #1e293b;
  vertical-align: top;
}
.d-table td:first-child {
  color: #64748b; width: 90px; white-space: nowrap;
  font-size: 11px;
}
.d-table td:last-child { color: #e2e8f0; }

.d-code-block {
  font-size: 12px; color: #22d3ee;
  background: rgba(34,211,238,0.05);
  padding: 10px 14px; border-radius: 6px;
  border: 1px solid rgba(34,211,238,0.12);
  font-family: inherit;
}

.d-empty {
  color: #475569; font-size: 13px; text-align: center;
  padding: 60px 20px; line-height: 2;
}
.d-empty .big-icon { font-size: 40px; margin-bottom: 10px; }
</style>

// ═══ 渲染树 ═══

function renderTree(node, container) {
  const ul = document.createElement('ul'); ul.className = 'tree';
  (node.children || []).forEach(child => {
    const li = document.createElement('li');
    const hasChildren = child.children && child.children.length > 0;
    const expanded = child.label === 'Agent Core' || child.label === '后端层';

    const nodeDiv = document.createElement('div');
    nodeDiv.className = 'node has-detail';
    nodeDiv.dataset.searchText = `${child.icon||''} ${child.label} ${child.sub||''}`.toLowerCase();

    const toggle = document.createElement('span');
    toggle.className = `toggle ${hasChildren ? (expanded ? 'expanded' : '') : 'empty'}`;
    toggle.textContent = hasChildren ? '▶' : '';
    nodeDiv.appendChild(toggle);

    const icon = document.createElement('span');
    icon.className = 'icon'; icon.textContent = child.icon || '•';
    nodeDiv.appendChild(icon);

    const label = document.createElement('span');
    label.className = 'label'; label.textContent = child.label;
    nodeDiv.appendChild(label);

    if (child.sub) {
      const sub = document.createElement('span');
      sub.className = 'sublabel'; sub.textContent = child.sub;
      nodeDiv.appendChild(sub);
    }

    nodeDiv.addEventListener('click', (e) => {
      e.stopPropagation();
      document.querySelectorAll('.node.selected').forEach(n => n.classList.remove('selected'));
      nodeDiv.classList.add('selected');

      if (hasChildren) {
        const childUl = li.querySelector('ul');
        if (childUl) {
          childUl.style.display = childUl.style.display === 'none' ? '' : 'none';
          toggle.classList.toggle('expanded');
        }
      }

      showDetail(child.label);
    });

    li.appendChild(nodeDiv);

    if (hasChildren) {
      const childContainer = document.createElement('div');
      renderTree(child, childContainer);
      const childUl = childContainer.querySelector('ul');
      if (childUl) {
        if (!expanded) childUl.style.display = 'none';
        li.appendChild(childUl);
      }
    }
    ul.appendChild(li);
  });
  container.appendChild(ul);
}

// ═══ 右侧详情 ═══

function showDetail(label) {
  const panel = document.getElementById('detail-panel');
  const content = document.getElementById('detail-content');
  const emptyState = document.getElementById('empty-state');
  const data = details[label];

  if (!data) {
    // 无详情数据时显示简易信息
    content.style.display = 'none';
    emptyState.style.display = 'block';
    emptyState.innerHTML = `<div class="big-icon">📋</div><div>${label}</div><div style="font-size:11px">暂无详细参数 · 可手动补充</div>`;
    panel.classList.add('open');
    return;
  }

  emptyState.style.display = 'none';
  content.style.display = 'block';

  let html = `<div class="d-header">
    <div class="d-icon">${data.icon}</div>
    <div class="d-title-group">
      <div class="d-title">${label}</div>
      <div class="d-sub">${data.desc || ''}</div>
    </div>
    <button class="d-close" onclick="closeDetail()">✕</button>
  </div>`;

  if (data.fields && data.fields.length > 0) {
    html += `<div class="d-section"><h3>参数</h3><table class="d-table">`;
    data.fields.forEach(f => {
      html += `<tr><td>${f[0]}</td><td>${f[1]}</td></tr>`;
    });
    html += `</table></div>`;
  }

  if (data.code) {
    html += `<div class="d-section"><h3>代码路径</h3><div class="d-code-block">${data.code}</div></div>`;
  }

  content.innerHTML = html;
  panel.classList.add('open');
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
}

// ═══ 搜索 ═══

function filterTree(query) {
  const q = query.toLowerCase().trim();
  document.querySelectorAll('.tree .node').forEach(n => {
    const text = n.dataset.searchText || '';
    const li = n.closest('li');
    if (!q) { li.style.display = ''; return; }
    const match = text.includes(q);
    li.style.display = match ? '' : 'none';
    if (match) {
      let parent = li.parentElement?.closest('li');
      while (parent) {
        const ul = parent.querySelector('ul');
        if (ul) ul.style.display = '';
        const tog = parent.querySelector('.toggle');
        if (tog) tog.classList.add('expanded');
        parent = parent.parentElement?.closest('li');
      }
    }
  });
}
