<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>坐山客 · 科技男孩 v2.1</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif;
  background: #0d1117;
  color: #c9d1d9;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
.topbar {
  height: 46px; background:#161b22; border-bottom:1px solid #30363d;
  display:flex; align-items:center; padding:0 18px; gap:24px; flex-shrink:0;
}
.logo-group { display:flex; align-items:center; gap:10px; cursor:pointer; flex-shrink:0; }
.logo-text {
  font-family:'Noto Sans SC','Microsoft YaHei',sans-serif;
  font-weight:900; font-size:24px; letter-spacing:2px;
  background:linear-gradient(180deg,#ffd700,#f0c040 30%,#c8a84e 60%,#a08030 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  filter:drop-shadow(0 0 6px rgba(255,215,0,0.3));
}
.spacer { flex:1; }
.btn {
  padding:5px 12px; border-radius:5px; border:1px solid #30363d;
  background:#21262d; color:#c9d1d9; font-size:13px; cursor:pointer; white-space:nowrap;
}
.btn:hover { background:#1c2128; }

/* ═══ Floating Character ═══ */
.char-float-area {
  position:relative; height:0; z-index:100;
  display:flex; justify-content:center;
  pointer-events:none;
}
.char-container {
  position:relative;
  width:50px; height:60px;        /* 50px char + extra for float */
  pointer-events:auto;
  cursor:pointer;
  transition: opacity 0.3s, transform 0.3s;
}
.char-container.hidden-char {
  opacity:0; transform:translateY(-16px) scale(0.8);
  pointer-events:none;
}
.char-canvas {
  width:50px; height:50px;
  position:absolute;
  top:-4px;
  left:50%;
  transform:translateX(-50%);
  filter:drop-shadow(0 3px 16px rgba(0,212,255,0.12));
  transition:filter 0.3s;
}
.char-canvas:hover {
  filter:drop-shadow(0 3px 24px rgba(0,212,255,0.25));
}
.char-canvas svg { width:100%; height:100%; }

/* ═══ Speech Bubble (RIGHT side) ═══ */
.speech-bubble {
  position:absolute;
  top:4px;
  left:54px;                     /* right of the 50px char */
  background:#1a2332;
  border:1px solid #00d4ff44;
  border-radius:7px;
  padding:3px 9px;
  font-size:11px;
  color:#c9d1d9;
  white-space:nowrap;
  max-width:180px;
  overflow:hidden;
  text-overflow:ellipsis;
  opacity:0;
  transform:translateX(-4px) scale(0.92);
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  pointer-events:none;
  z-index:101;
}
.speech-bubble.show {
  opacity:1;
  transform:translateX(0) scale(1);
}
.speech-bubble::before {
  content:'';
  position:absolute;
  left:-4px;
  top:8px;
  border:4px solid transparent;
  border-right-color:#1a2332;
}
.speech-bubble .dot {
  display:inline-block; width:4px; height:4px; border-radius:50%;
  margin-right:3px; vertical-align:middle;
  animation:pulse-dot 1.5s ease-in-out infinite;
}

/* ═══ Toggle Hint ═══ */
.toggle-char-btn {
  position:fixed; top:12px; left:50%; transform:translateX(-50%);
  z-index:102;
  background:#21262d; border:1px solid #30363d;
  border-radius:8px; padding:2px 8px; font-size:10px; color:#484f58;
  cursor:pointer; transition:all 0.2s;
  opacity:0; pointer-events:none;
}
.toggle-char-btn:hover { color:#8b949e; border-color:#58a6ff55; }
.toggle-char-btn.show-btn { opacity:1; pointer-events:auto; }

/* ═══ Statusbar ═══ */
.statusbar {
  height:26px; background:#161b22; border-top:1px solid #30363d;
  display:flex; align-items:center; padding:0 14px; gap:14px;
  font-size:12px; color:#8b949e; flex-shrink:0;
}
.statusbar .dot { width:7px; height:7px; border-radius:50%; }
.statusbar .dot.green { background:#3fb950; }

/* ═══ Main ═══ */
.main { flex:1; display:flex; overflow:hidden; }
.chat-panel { flex:1; display:flex; flex-direction:column; padding:20px; }

.control-panel {
  background:#161b22; border:1px solid #30363d; border-radius:8px;
  padding:14px 18px; margin-bottom:14px;
}
.control-panel h3 { font-size:12px; color:#8b949e; margin-bottom:8px; letter-spacing:1px; }
.state-buttons { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:8px; }
.state-btn {
  padding:4px 10px; border-radius:5px; border:1px solid #30363d;
  background:#0d1117; color:#8b949e; font-size:11px; cursor:pointer;
  transition:all 0.15s;
}
.state-btn:hover { border-color:#00d4ff77; color:#c9d1d9; }
.state-btn.active { background:#0a2a3f; border-color:#00d4ff; color:#00d4ff; }
.custom-msg-input { display:flex; gap:6px; align-items:center; }
.custom-msg-input input {
  flex:1; background:#0d1117; border:1px solid #30363d;
  border-radius:4px; padding:4px 8px; color:#c9d1d9; font-size:12px; outline:none;
}
.custom-msg-input input:focus { border-color:#00d4ff; }

.demo-chat {
  flex:1; display:flex; flex-direction:column; gap:8px;
  padding:14px 18px; background:rgba(22,27,34,0.6);
  border:1px solid #30363d44; border-radius:8px;
  min-height:140px;
}
.msg {
  padding:6px 12px; border-radius:6px; max-width:70%;
  font-size:13px; line-height:1.5;
}
.msg.user { align-self:flex-end; background:#0a2a3f; border:1px solid #00d4ff44; }
.msg.agent { align-self:flex-start; background:#1a2332; border:1px solid #30363d; }

/* ═══ Animations ═══ */
@keyframes pulse-dot { 0%,100%{opacity:0.4;transform:scale(1)} 50%{opacity:1;transform:scale(1.3)} }
@keyframes hud-float { 0%,100%{transform:translateY(0) rotate(0deg);opacity:0.6} 50%{transform:translateY(-1.5px) rotate(1.5deg);opacity:0.85} }
.hud-element { animation:hud-float 2.5s ease-in-out infinite; }
@keyframes scan-pulse { 0%,100%{opacity:0.08} 50%{opacity:0.3} }
.scan-line { animation:scan-pulse 1.5s ease-in-out infinite; }
@keyframes visor-glow { 0%,100%{opacity:0.4;filter:drop-shadow(0 0 1px #00d4ff)} 50%{opacity:0.65;filter:drop-shadow(0 0 4px #00d4ff)} }
.visor-glow { animation:visor-glow 2s ease-in-out infinite; }
@keyframes breathe-sm { 0%,100%{transform:scale(1)} 50%{transform:scale(1.008)} }
.char-idle .char-canvas { animation:breathe-sm 3s ease-in-out infinite; }
@keyframes greet-bounce-sm {
  0%,100%{transform:translateX(-50%) translateY(0)}
  30%{transform:translateX(-50%) translateY(-5px)}
  60%{transform:translateX(-50%) translateY(-1px)}
}
.char-greeting .char-canvas { animation:greet-bounce-sm 0.8s ease-out 2; }
@keyframes think-tilt-sm { 0%,100%{transform:translateX(-50%) rotate(0)} 50%{transform:translateX(-50%) rotate(3deg)} }
.char-thinking .char-canvas { animation:think-tilt-sm 1.2s ease-in-out infinite; }
@keyframes work-pulse-sm { 0%,100%{transform:translateX(-50%) scale(1)} 50%{transform:translateX(-50%) scale(1.025)} }
.char-working .char-canvas { animation:work-pulse-sm 0.5s ease-in-out infinite; }
@keyframes done-pop-sm {
  0%{transform:translateX(-50%) scale(1)}
  30%{transform:translateX(-50%) scale(1.1) rotate(-3deg)}
  60%{transform:translateX(-50%) scale(1.12) rotate(3deg)}
  100%{transform:translateX(-50%) scale(1)}
}
.char-done .char-canvas { animation:done-pop-sm 0.7s ease-out 1; }
@keyframes shake-sm { 0%,100%{transform:translateX(-50%)} 15%{transform:translateX(-50%) translateY(-2px)} 30%{transform:translateX(-50%) translateY(2px)} 45%{transform:translateX(-50%) translateY(-1px)} 60%{transform:translateX(-50%) translateY(1px)} }
.char-error .char-canvas { animation:shake-sm 0.5s ease-in-out 2; }
@keyframes notify-pulse-sm { 0%,100%{filter:drop-shadow(0 0 6px rgba(0,212,255,0.15))} 50%{filter:drop-shadow(0 0 18px rgba(0,212,255,0.4))} }
.char-notify .char-canvas { animation:notify-pulse-sm 1s ease-in-out 3; }
</style>
</head>
<body>

<!-- ═══ Topbar ═══ -->
<div class="topbar" id="topbar">
  <div class="logo-group">
    <svg width="28" height="28" viewBox="0 0 40 40">
      <polygon points="20,3 38,35 2,35" fill="none" stroke="#58a6ff" stroke-width="2.5" stroke-linejoin="round"/>
      <polygon points="20,11 31,32 9,32" fill="rgba(88,166,255,0.12)" stroke="#58a6ff" stroke-width="1.5" stroke-linejoin="round"/>
      <line x1="20" y1="20" x2="20" y2="27" stroke="#58a6ff" stroke-width="2" stroke-linecap="round"/>
      <circle cx="20" cy="18" r="2.5" fill="#58a6ff"/>
    </svg>
    <span class="logo-text">坐山客</span>
  </div>
  <span class="breadcrumb" style="color:#484f58;">›</span>
  <span class="spacer"></span>
  <button class="btn">🧠 Thinking Map</button>
  <button class="btn">⚡ Action Map</button>
  <button class="btn">⚙</button>
</div>

<!-- ═══ Floating Character ═══ -->
<div class="char-float-area">
  <div class="char-container" id="charContainer">

    <!-- Speech Bubble → RIGHT -->
    <div class="speech-bubble" id="speechBubble">
      <span class="dot" id="statusDot" style="background:#58a6ff;"></span>
      <span id="speechText">在线待命</span>
    </div>

    <!-- Character Canvas 50px -->
    <div class="char-canvas" id="charCanvas">
      <svg viewBox="18 3 36 38" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.1"/>
            <stop offset="60%" stop-color="#00d4ff" stop-opacity="0.03"/>
            <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
          </radialGradient>
          <linearGradient id="hairGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#1a1a2e"/>
            <stop offset="50%" stop-color="#16213e"/>
            <stop offset="100%" stop-color="#0f3460"/>
          </linearGradient>
          <linearGradient id="hairStreak" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#00d4ff"/>
            <stop offset="100%" stop-color="#7b2ff7"/>
          </linearGradient>
          <linearGradient id="visorGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.25"/>
            <stop offset="50%" stop-color="#00d4ff" stop-opacity="0.06"/>
            <stop offset="100%" stop-color="#00d4ff" stop-opacity="0.15"/>
          </linearGradient>
          <filter id="neonGlow"><feGaussianBlur stdDeviation="0.8"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          <filter id="softGlow"><feGaussianBlur stdDeviation="0.6"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        </defs>

        <!-- BG Glow -->
        <circle cx="36" cy="26" r="22" fill="url(#bgGlow)"/>

        <!-- Circuit traces -->
        <path d="M12 32 L16 28 L16 24 L20 24" fill="none" stroke="#00d4ff" stroke-width="0.6" opacity="0.25" class="scan-line"/>
        <path d="M60 32 L56 28 L56 24 L52 24" fill="none" stroke="#00d4ff" stroke-width="0.6" opacity="0.25" class="scan-line"/>

        <!-- HUD hex top-left -->
        <g class="hud-element" style="transform-origin:16px 10px;">
          <polygon points="14,8 16,7 18,8 18,10 16,11 14,10" fill="none" stroke="#00d4ff" stroke-width="0.5" opacity="0.45"/>
        </g>
        <!-- HUD hex top-right -->
        <g class="hud-element" style="transform-origin:56px 10px; animation-delay:0.8s;">
          <polygon points="54,8 56,7 58,8 58,10 56,11 54,10" fill="none" stroke="#7b2ff7" stroke-width="0.5" opacity="0.45"/>
        </g>
        <!-- Crosshair -->
        <g opacity="0.12">
          <line x1="36" y1="7" x2="36" y2="10" stroke="#00d4ff" stroke-width="0.5"/>
          <line x1="36" y1="44" x2="36" y2="41" stroke="#00d4ff" stroke-width="0.5"/>
          <line x1="14" y1="26" x2="17" y2="26" stroke="#00d4ff" stroke-width="0.5"/>
          <line x1="58" y1="26" x2="55" y2="26" stroke="#00d4ff" stroke-width="0.5"/>
        </g>

        <!-- ═══ HAIR ═══ (refined for close-up) -->
        <!-- Base -->
        <path d="M26 14 Q26 6 31 4 Q33 3 36 4 Q39 3 41 4 Q46 6 46 14 Q42 9 36 8 Q30 9 26 14 Z" fill="url(#hairGrad)"/>
        <!-- Left sweep -->
        <path d="M26 12 Q24 9 27 7 Q29 6 31 7 Q29 9 28 12 Z" fill="url(#hairGrad)"/>
        <!-- Spikes -->
        <path d="M31 5 Q31 3 32 2 L33 5 Z" fill="url(#hairGrad)"/>
        <path d="M36 4 Q36 2 37 1 L38 4 Z" fill="url(#hairGrad)"/>
        <path d="M40 5 Q41 3 42 3 L42 5 Z" fill="url(#hairGrad)"/>
        <!-- Neon streak -->
        <path d="M30 11 Q31 8 34 7" fill="none" stroke="url(#hairStreak)" stroke-width="1.3" stroke-linecap="round" filter="url(#softGlow)"/>
        <path d="M37 9 Q39 7 42 7" fill="none" stroke="url(#hairStreak)" stroke-width="0.8" stroke-linecap="round" opacity="0.5" filter="url(#softGlow)"/>

        <!-- ═══ FACE ═══ -->
        <ellipse cx="36" cy="18" rx="9" ry="9.5" fill="#1a1a2e" stroke="#2d3748" stroke-width="0.6"/>
        <!-- Jaw -->
        <path d="M27 18 Q27 25 31 27 Q36 28 41 27 Q45 25 45 18" fill="none" stroke="#2d3748" stroke-width="0.4" opacity="0.4"/>
        <!-- Chin -->
        <path d="M33 26 Q36 27 39 26" fill="none" stroke="#3d4a5c" stroke-width="0.3" opacity="0.25"/>

        <!-- ═══ VISOR ═══ (larger proportion for close-up) -->
        <path d="M25 15 Q29 13 36 13 Q43 13 47 15 L47 19 Q43 21 36 21 Q29 21 25 19 Z" fill="url(#visorGrad)" stroke="#00d4ff" stroke-width="0.7" opacity="0.7" class="visor-glow"/>
        <!-- Visor shine -->
        <path d="M27 16 Q30 15 33 15 L34 16 L32 17 Q29 17 27 16 Z" fill="#00d4ff" opacity="0.12"/>
        <!-- Center sensor -->
        <circle cx="36" cy="17" r="1.2" fill="#00d4ff" opacity="0.25" filter="url(#neonGlow)"/>
        <!-- Side nodes -->
        <circle cx="27" cy="17" r="0.7" fill="#00d4ff" opacity="0.35" filter="url(#neonGlow)"/>
        <circle cx="45" cy="17" r="0.7" fill="#00d4ff" opacity="0.35" filter="url(#neonGlow)"/>
        <!-- Top rim -->
        <path d="M26 15 Q31 13.5 36 13.5 Q41 13.5 46 15" fill="none" stroke="#00d4ff" stroke-width="0.35" opacity="0.5"/>

        <!-- ═══ EYES on Visor ═══ -->
        <g id="visorEyes">
          <path d="M31 16 Q33 15 35 16" fill="none" stroke="#00d4ff" stroke-width="0.9" stroke-linecap="round" id="eyeL" class="eye-closed"/>
          <path d="M37 16 Q39 15 41 16" fill="none" stroke="#00d4ff" stroke-width="0.9" stroke-linecap="round" id="eyeR" class="eye-closed"/>
        </g>

        <!-- ═══ MOUTH ═══ -->
        <path d="M33 22.5 Q36 24 39 22.5" fill="none" stroke="#3d4a5c" stroke-width="0.7" stroke-linecap="round" id="mouth"/>

        <!-- ═══ Earpiece ═══ -->
        <circle cx="46" cy="15" r="1.8" fill="none" stroke="#00d4ff" stroke-width="0.4" opacity="0.35"/>
        <circle cx="46" cy="15" r="0.5" fill="#00d4ff" opacity="0.25" filter="url(#neonGlow)"/>

        <!-- Bottom data bar -->
        <g opacity="0.1">
          <rect x="30" y="44" width="12" height="1.2" rx="0.6" fill="#00d4ff"/>
        </g>
      </svg>
    </div>

    <div class="toggle-char-btn" id="toggleHint" onclick="toggleChar()">✕ 隐藏</div>

  </div>
</div>

<!-- ═══ Main ═══ -->
<div class="main">
  <div class="chat-panel">
    <div class="control-panel">
      <h3>🎮 坐山客 · 50px 头部特写</h3>
      <div class="state-buttons">
        <button class="state-btn active" data-state="idle" onclick="setState('idle')">💤 待命</button>
        <button class="state-btn" data-state="greeting" onclick="setState('greeting')">👋 招呼</button>
        <button class="state-btn" data-state="thinking" onclick="setState('thinking')">🤔 思考</button>
        <button class="state-btn" data-state="working" onclick="setState('working')">⚡ 执行</button>
        <button class="state-btn" data-state="done" onclick="setState('done')">✅ 搞定</button>
        <button class="state-btn" data-state="error" onclick="setState('error')">⚠️ 出错</button>
        <button class="state-btn" data-state="notify" onclick="setState('notify')">🔔 通知</button>
      </div>
      <div class="custom-msg-input">
        <input type="text" id="customMsg" placeholder="自定义气泡..." value="北京今日晴，24°C">
        <button class="state-btn" onclick="setCustomMsg()">💬 说</button>
        <button class="state-btn" style="color:#6e7681;" onclick="toggleChar()">👁 隐</button>
      </div>
    </div>
    <div class="demo-chat">
      <div class="msg agent">‎👋 来了来了，今天啥事？</div>
      <div class="msg user">查北京天气</div>
      <div class="msg agent">‎🤔 扫一下...</div>
    </div>
  </div>
</div>

<div class="statusbar">
  <span class="dot green"></span>
  坐山客 v2.1 · 头部特写 50px
  <span>|</span>
  角色: <span id="statusBarState">待命</span>
  <span>|</span>
  <span style="color:#484f58;cursor:pointer;" onclick="toggleChar()">[隐藏]</span>
</div>

<script>
const states = {
  idle:     { label:'待命', color:'#58a6ff', bubble:'在线待命',           face:{eyes:'closed',mouth:'smile'} },
  greeting: { label:'招呼', color:'#00d4ff', bubble:'清泉，来了啊！👋',   face:{eyes:'open',mouth:'bigSmile'} },
  thinking: { label:'思考', color:'#d29922', bubble:'唔...我看看',        face:{eyes:'side',mouth:'pursed'} },
  working:  { label:'执行', color:'#bc8cff', bubble:'处理中，别急',       face:{eyes:'focused',mouth:'neutral'} },
  done:     { label:'搞定', color:'#3fb950', bubble:'搞定！✅',           face:{eyes:'happy',mouth:'big'} },
  error:    { label:'出错', color:'#f85149', bubble:'啧，出问题了 ⚠️',   face:{eyes:'worried',mouth:'frown'} },
  notify:   { label:'通知', color:'#00d4ff', bubble:'有情况！',          face:{eyes:'open',mouth:'smile'} },
};
let currentState='idle', hidden=false;

const eyeShapes = {
  closed:  { L:'M31 16 Q33 15 35 16',    R:'M37 16 Q39 15 41 16' },
  open:    { L:'M30 15 Q32 13.5 34 15',  R:'M38 15 Q40 13.5 42 15' },
  side:    { L:'M30 15 Q31 14 32 15',    R:'M38 15 Q39 14 40 15' },
  focused: { L:'M30 15 Q32 14 34 15',    R:'M38 15 Q40 14 42 15' },
  happy:   { L:'M30.5 14.5 Q32 13.5 33.5 14.5', R:'M38.5 14.5 Q40 13.5 41.5 14.5' },
  worried: { L:'M30.5 16 Q32 17 33.5 16', R:'M38.5 16 Q40 17 41.5 16' },
};
const mouthShapes = {
  smile:   'M33 22.5 Q36 24 39 22.5',
  bigSmile:'M32 22.5 Q36 25.5 40 22.5',
  neutral: 'M33 22.5 L39 22.5',
  pursed:  'M33.5 22.5 Q36 22 38.5 22.5',
  big:     'M32 22.5 Q36 26 40 22.5',
  frown:   'M33 23.5 Q36 22 39 23.5',
};

function updateFace(state) {
  const e = state.face.eyes, m = state.face.mouth;
  const eyeL = document.getElementById('eyeL'), eyeR = document.getElementById('eyeR');
  const mouth = document.getElementById('mouth');
  if (eyeShapes[e]) { eyeL.setAttribute('d',eyeShapes[e].L); eyeR.setAttribute('d',eyeShapes[e].R); }
  if (mouthShapes[m]) mouth.setAttribute('d',mouthShapes[m]);
}

function setState(name) {
  const state = states[name]; if(!state) return;
  currentState = name;
  document.querySelectorAll('.state-btn').forEach(b=>b.classList.toggle('active',b.dataset.state===name));
  const cont=document.getElementById('charContainer');
  cont.className='char-container'+(hidden?' hidden-char':'');
  cont.classList.add('char-'+name);
  updateFace(state);
  const b=document.getElementById('speechBubble'), t=document.getElementById('speechText'), d=document.getElementById('statusDot');
  t.textContent=state.bubble; d.style.background=state.color; b.classList.add('show');
  document.getElementById('statusBarState').textContent=state.label;
}

function setCustomMsg() {
  const m = document.getElementById('customMsg').value.trim();
  if(!m) return;
  document.getElementById('speechText').textContent=m;
  document.getElementById('speechBubble').classList.add('show');
  setState('notify');
  document.getElementById('statusBarState').textContent='说话中';
}
function toggleChar() {
  hidden=!hidden;
  const c=document.getElementById('charContainer');
  c.classList.toggle('hidden-char',hidden);
  document.getElementById('toggleHint').textContent=hidden?'👁 显示':'✕ 隐藏';
  document.getElementById('toggleHint').classList.toggle('show-btn',hidden);
  document.getElementById('statusBarState').textContent=hidden?'已隐藏':(currentState==='idle'?'待命':states[currentState]?.label||'...');
}
setState('idle');
</script>
</body>
</html>
