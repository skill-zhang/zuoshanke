<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>坐山客 · 科技男孩 v2.3</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC',sans-serif;
  background:#0d1117; color:#c9d1d9;
  min-height:100vh; display:flex; flex-direction:column;
}
.topbar {
  height:46px; background:#161b22; border-bottom:1px solid #30363d;
  display:flex; align-items:center; padding:0 18px; gap:24px; flex-shrink:0;
}
.logo-group { display:flex; align-items:center; gap:10px; cursor:pointer; flex-shrink:0; }
.logo-text {
  font-family:'Noto Sans SC','Microsoft YaHei',sans-serif;
  font-weight:900; font-size:24px; letter-spacing:2px;
  background:linear-gradient(180deg,#ffd700,#f0c040 30%,#c8a84e 60%,#a08030 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  filter:drop-shadow(0 0 6px rgba(255,215,0,0.3));
}
.spacer { flex:1; }
.btn { padding:5px 12px; border-radius:5px; border:1px solid #30363d; background:#21262d; color:#c9d1d9; font-size:13px; cursor:pointer; white-space:nowrap; }
.btn:hover { background:#1c2128; }

/* ═══ Character ═══ */
.char-float-area {
  position:fixed; top:0; left:0; width:100%;
  z-index:100;
  display:flex; justify-content:center;
  pointer-events:none;
}
.char-container {
  position:relative;
  width:60px; height:66px;
  pointer-events:auto;
  cursor:pointer;
  margin-left:-25px;            /* shift 25px left (10 more) */
  transition: opacity 0.3s, transform 0.3s;
}
.char-container.hidden-char {
  opacity:0; transform:translateY(-20px) scale(0.8);
  pointer-events:none;
}
.char-canvas {
  width:56px; height:56px;
  position:absolute;
  top:-3px;                     /* -3px from top (was 2, now 5px higher) */
  left:50%;
  transform:translateX(-50%);
  filter:drop-shadow(0 2px 16px rgba(0,212,255,0.12));
  transition:filter 0.3s;
}
.char-canvas:hover {
  filter:drop-shadow(0 2px 28px rgba(0,212,255,0.25));
}
.char-canvas svg { width:100%; height:100%; }

/* ═══ Speech Bubble — RIGHT ═══ */
.speech-bubble {
  position:absolute;
  top:10px;                     /* top unchanged */
  left:68px;                    /* further right to avoid overlap */
  background:#1a2332;
  border:1px solid #00d4ff55;
  border-radius:8px;
  padding:3px 10px;
  font-size:13px;               /* bigger font */
  color:#c9d1d9;
  white-space:nowrap;
  max-width:200px;
  overflow:hidden;
  text-overflow:ellipsis;
  opacity:0;
  transform:translateX(-4px) scale(0.92);
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  pointer-events:none;
  z-index:101;
}
.speech-bubble.show {
  opacity:1;
  transform:translateX(0) scale(1);
}
.speech-bubble::before {
  content:'';
  position:absolute;
  left:-5px;
  top:8px;
  border:5px solid transparent;
  border-right-color:#1a2332;
}
.speech-bubble .dot {
  display:inline-block; width:5px; height:5px; border-radius:50%;
  margin-right:4px; vertical-align:middle;
  animation:pulse-dot 1.5s ease-in-out infinite;
}

/* Toggle hint */
.toggle-char-btn {
  position:fixed; top:6px; left:calc(50% - 25px); transform:translateX(-50%);
  z-index:102;
  background:#21262d; border:1px solid #30363d;
  border-radius:8px; padding:2px 8px; font-size:10px; color:#484f58;
  cursor:pointer; transition:all 0.2s;
  opacity:0; pointer-events:none;
}
.toggle-char-btn:hover { color:#8b949e; border-color:#58a6ff55; }
.toggle-char-btn.show-btn { opacity:1; pointer-events:auto; }

/* Statusbar */
.statusbar {
  height:26px; background:#161b22; border-top:1px solid #30363d;
  display:flex; align-items:center; padding:0 14px; gap:14px;
  font-size:12px; color:#8b949e; flex-shrink:0;
}
.statusbar .dot { width:7px; height:7px; border-radius:50%; }
.statusbar .dot.green { background:#3fb950; }

/* Main */
.main { flex:1; display:flex; overflow:hidden; }
.chat-panel { flex:1; display:flex; flex-direction:column; padding:20px; }

.control-panel {
  background:#161b22; border:1px solid #30363d; border-radius:8px;
  padding:14px 18px; margin-bottom:14px;
}
.control-panel h3 { font-size:12px; color:#8b949e; margin-bottom:8px; letter-spacing:1px; }
.state-buttons { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:8px; }
.state-btn {
  padding:4px 10px; border-radius:5px; border:1px solid #30363d;
  background:#0d1117; color:#8b949e; font-size:11px; cursor:pointer; transition:all 0.15s;
}
.state-btn:hover { border-color:#00d4ff77; color:#c9d1d9; }
.state-btn.active { background:#0a2a3f; border-color:#00d4ff; color:#00d4ff; }
.custom-msg-input { display:flex; gap:6px; align-items:center; }
.custom-msg-input input {
  flex:1; background:#0d1117; border:1px solid #30363d;
  border-radius:4px; padding:4px 8px; color:#c9d1d9; font-size:12px; outline:none;
}
.custom-msg-input input:focus { border-color:#00d4ff; }
.demo-chat {
  flex:1; display:flex; flex-direction:column; gap:8px;
  padding:14px 18px; background:rgba(22,27,34,0.6);
  border:1px solid #30363d44; border-radius:8px; min-height:140px;
}
.msg { padding:6px 12px; border-radius:6px; max-width:70%; font-size:13px; line-height:1.5; }
.msg.user { align-self:flex-end; background:#0a2a3f; border:1px solid #00d4ff44; }
.msg.agent { align-self:flex-start; background:#1a2332; border:1px solid #30363d; }

@keyframes pulse-dot { 0%,100%{opacity:0.4;transform:scale(1)} 50%{opacity:1;transform:scale(1.3)} }
@keyframes hud-float { 0%,100%{transform:translateY(0) rotate(0);opacity:0.55} 50%{transform:translateY(-1px) rotate(1deg);opacity:0.85} }
.hud-element { animation:hud-float 2.5s ease-in-out infinite; }
@keyframes scan-pulse { 0%,100%{opacity:0.08} 50%{opacity:0.25} }
.scan-line { animation:scan-pulse 1.5s ease-in-out infinite; }
@keyframes visor-pulse { 0%,100%{opacity:0.35;filter:drop-shadow(0 0 1px #00d4ff)} 50%{opacity:0.6;filter:drop-shadow(0 0 4px #00d4ff)} }
.visor-glow { animation:visor-pulse 2s ease-in-out infinite; }
@keyframes breathe-sm { 0%,100%{transform:translateX(-50%) scale(1)} 50%{transform:translateX(-50%) scale(1.008)} }
.char-idle .char-canvas { animation:breathe-sm 3s ease-in-out infinite; }
@keyframes greet-bounce-sm {
  0%,100%{transform:translateX(-50%) translateY(0)}
  30%{transform:translateX(-50%) translateY(-5px)}
  60%{transform:translateX(-50%) translateY(-1px)}
}
.char-greeting .char-canvas { animation:greet-bounce-sm 0.8s ease-out 2; }
@keyframes think-tilt-sm { 0%,100%{transform:translateX(-50%) rotate(0)} 50%{transform:translateX(-50%) rotate(3deg)} }
.char-thinking .char-canvas { animation:think-tilt-sm 1.2s ease-in-out infinite; }
@keyframes work-pulse-sm { 0%,100%{transform:translateX(-50%) scale(1)} 50%{transform:translateX(-50%) scale(1.025)} }
.char-working .char-canvas { animation:work-pulse-sm 0.5s ease-in-out infinite; }
@keyframes done-pop-sm {
  0%{transform:translateX(-50%) scale(1)}
  30%{transform:translateX(-50%) scale(1.1) rotate(-3deg)}
  60%{transform:translateX(-50%) scale(1.12) rotate(3deg)}
  100%{transform:translateX(-50%) scale(1)}
}
.char-done .char-canvas { animation:done-pop-sm 0.7s ease-out 1; }
@keyframes shake-sm { 0%,100%{transform:translateX(-50%)} 15%{transform:translateX(-50%) translateY(-3px)} 30%{transform:translateX(-50%) translateY(3px)} 45%{transform:translateX(-50%) translateY(-2px)} 60%{transform:translateX(-50%) translateY(2px)} }
.char-error .char-canvas { animation:shake-sm 0.5s ease-in-out 2; }
@keyframes notify-pulse-sm { 0%,100%{filter:drop-shadow(0 0 6px rgba(0,212,255,0.15))} 50%{filter:drop-shadow(0 0 18px rgba(0,212,255,0.4))} }
.char-notify .char-canvas { animation:notify-pulse-sm 1s ease-in-out 3; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo-group">
    <svg width="28" height="28" viewBox="0 0 40 40">
      <polygon points="20,3 38,35 2,35" fill="none" stroke="#58a6ff" stroke-width="2.5" stroke-linejoin="round"/>
      <polygon points="20,11 31,32 9,32" fill="rgba(88,166,255,0.12)" stroke="#58a6ff" stroke-width="1.5" stroke-linejoin="round"/>

        <path d="M14 42 L10 44 L12 50 L16 54 L56 54 L60 50 L62 44 L58 42" fill="url(#jacketGrad)" stroke="#1e2a3a" stroke-width="0.8"/>
        <path d="M26 34 Q22 32 24 28 L48 28 Q50 32 46 34 Z" fill="#1a2332" stroke="#1e2a3a" stroke-width="0.6"/>

        <circle cx="60" cy="46" r="1" fill="#00d4ff" opacity="0.4" filter="url(#softGlow)"/>

        <rect x="32" y="28" width="8" height="6" rx="2" fill="url(#skinTone)" stroke="#2d3748" stroke-width="0.4"/>

        <ellipse cx="36" cy="20" rx="10" ry="10.5" fill="url(#skinTone)" stroke="#2d3748" stroke-width="0.6"/>
        <path d="M26 20 Q26 28 30 30 Q36 31 42 30 Q46 28 46 20" fill="none" stroke="#2d3748" stroke-width="0.4" opacity="0.4"/>

        <path d="M26 14 Q24 10 27 8 Q29 7 31 8 Q29 10 28 13 Z" fill="url(#hairGrad)"/>

        <path d="M29 13 Q30 9 33 8" fill="none" stroke="url(#hairStreak)" stroke-width="1.5" stroke-linecap="round" filter="url(#softGlow)"/>
        <path d="M37 10 Q39 7 42 7" fill="none" stroke="url(#hairStreak)" stroke-width="0.8" stroke-linecap="round" opacity="0.5" filter="url(#softGlow)"/>

        <!-- Visor -->
        <path d="M24 16 Q28 14 36 14 Q44 14 48 16 L48 20 Q44 22 36 22 Q28 22 24 20 Z" fill="url(#visorGrad)" stroke="#00d4ff" stroke-width="0.7" opacity="0.7" class="visor-glow"/>

  <span class="dot green"></span>
  坐山客 v2.3

<script>
const states = {
  idle:     { label:'待命', color:'#58a6ff', bubble:'在线待命',           face:{eyes:'closed',mouth:'smile'} },
  greeting: { label:'招呼', color:'#00d4ff', bubble:'清泉，来了啊！👋',   face:{eyes:'open',mouth:'bigSmile'} },
  thinking: { label:'思考', color:'#d29922', bubble:'唔...我看看',        face:{eyes:'side',mouth:'pursed'} },
  working:  { label:'执行', color:'#bc8cff', bubble:'处理中，别急',       face:{eyes:'focused',mouth:'neutral'} },
  done:     { label:'搞定', color:'#3fb950', bubble:'搞定！✅',           face:{eyes:'happy',mouth:'big'} },
  error:    { label:'出错', color:'#f85149', bubble:'啧，出问题了 ⚠️',   face:{eyes:'worried',mouth:'frown'} },
  notify:   { label:'通知', color:'#00d4ff', bubble:'有情况！',          face:{eyes:'open',mouth:'smile'} },
  resting:  { label:'休息', color:'#6e7681', bubble:'zzZ...',            face:{eyes:'zzz',mouth:'smile'} },
  angry:    { label:'愤怒', color:'#f85149', bubble:'哼！',              face:{eyes:'angry',mouth:'gnash'} },
  laugh:    { label:'大笑', color:'#3fb950', bubble:'哈哈哈😂',         face:{eyes:'laughTears',mouth:'rofl'} },
  sad:      { label:'悲伤', color:'#58a6ff', bubble:'呜...😢',          face:{eyes:'sadTears',mouth:'cry'} },
};
let currentState='idle', hidden=false;

const eyeShapes = {
  closed:  { L:'M31 17 Q33 16 35 17',    R:'M37 17 Q39 16 41 17' },
  open:    { L:'M30 16 Q32 14.5 34 16',  R:'M38 16 Q40 14.5 42 16' },
  side:    { L:'M30 16 Q31 15 32 16',    R:'M38 16 Q39 15 40 16' },
  focused: { L:'M30 16 Q32 15 34 16',    R:'M38 16 Q40 15 42 16' },
  happy:   { L:'M30.5 15.5 Q32 14.5 33.5 15.5', R:'M38.5 15.5 Q40 14.5 41.5 15.5' },
  worried: { L:'M30.5 18 Q32 19 33.5 18', R:'M38.5 18 Q40 19 41.5 18' },
  zzz:     { L:'M31 17 Q33 16.5 35 17',  R:'M37 17 Q39 16.5 41 17' },
  angry:   { L:'M29 16 L35 17',          R:'M37 17 L43 16' },
  laughTears:{ L:'M30.5 15.5 Q32 14 33.5 15.5', R:'M38.5 15.5 Q40 14 41.5 15.5' },
  sadTears:{ L:'M30 18 Q32 19.5 34 18',  R:'M38 18 Q40 19.5 42 18' },
};
const mouthShapes = {
  smile:   'M33 24 Q36 25.5 39 24',
  bigSmile:'M32 24 Q36 27 40 24',
  neutral: 'M33 24 L39 24',
  pursed:  'M33.5 24 Q36 23.5 38.5 24',
  big:     'M32 24 Q36 27.5 40 24',
  frown:   'M33 25 Q36 23.5 39 25',
  gnash:   'M33 24 L34 25 L35 24 L36 25 L37 24 L38 25 L39 24',
  rofl:    'M31 24 Q36 28.5 41 24',
  cry:     'M33 25.5 Q36 24.5 39 25.5',
};

function updateFace(state) {
  const e=state.face.eyes, m=state.face.mouth;
  const eyeL=document.getElementById('eyeL'), eyeR=document.getElementById('eyeR');
  const mouth=document.getElementById('mouth');
  if(eyeShapes[e]){eyeL.setAttribute('d',eyeShapes[e].L);eyeR.setAttribute('d',eyeShapes[e].R);}
  if(mouthShapes[m]) mouth.setAttribute('d',mouthShapes[m]);
}

function setState(name){
  const state=states[name]; if(!state) return;
  currentState=name;
  document.querySelectorAll('.state-btn').forEach(b=>b.classList.toggle('active',b.dataset.state===name));
  const c=document.getElementById('charContainer');
  c.className='char-container'+(hidden?' hidden-char':'');
  c.classList.add('char-'+name);
  updateFace(state);
  // Tears visibility: laugh → tearsLaugh, sad → tearsSad, else → both hidden
  const tl=document.getElementById('tearsLaugh'), ts=document.getElementById('tearsSad');
  tl.style.opacity= name==='laugh' ? '1' : '0';
  ts.style.opacity= name==='sad' ? '1' : '0';
  const b=document.getElementById('speechBubble'), t=document.getElementById('speechText'), d=document.getElementById('statusDot');
  t.textContent=state.bubble; d.style.background=state.color; b.classList.add('show');
  document.getElementById('statusBarState').textContent=state.label;
}

function setCustomMsg(){
  const m=document.getElementById('customMsg').value.trim();
  if(!m) return;
  document.getElementById('speechText').textContent=m;
  document.getElementById('speechBubble').classList.add('show');
  setState('notify');
  document.getElementById('statusBarState').textContent='说话中';
}
function toggleChar(){
  hidden=!hidden;
  const c=document.getElementById('charContainer');
  c.classList.toggle('hidden-char',hidden);
  document.getElementById('toggleHint').textContent=hidden?'👁 显示':'✕ 隐藏';
  document.getElementById('toggleHint').classList.toggle('show-btn',hidden);
  document.getElementById('statusBarState').textContent=hidden?'已隐藏':(currentState==='idle'?'待命':states[currentState]?.label||'...');
}
setState('idle');
</script>
</body>
</html>
