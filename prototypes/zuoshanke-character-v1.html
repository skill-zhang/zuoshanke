<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>坐山客 · 角色动画原型 v1.0</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif;
  background: #0d1117;
  color: #c9d1d9;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ═══ Header / Topbar ═══ */
.topbar {
  height: 68px;
  background: #161b22;
  border-bottom: 1px solid #30363d;
  display: flex;
  align-items: center;
  padding: 0 18px;
  gap: 16px;
  flex-shrink: 0;
  position: relative;
}

.logo-group {
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  flex-shrink: 0;
}

.logo-text {
  font-family: 'Noto Sans SC','Microsoft YaHei',sans-serif;
  font-weight: 900;
  font-size: 24px;
  letter-spacing: 2px;
  background: linear-gradient(180deg, #ffd700 0%, #f0c040 30%, #c8a84e 60%, #a08030 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 6px rgba(255,215,0,0.3));
}

/* ═══ Character Container ═══ */
.character-area {
  display: flex;
  align-items: center;
  gap: 10px;
  position: relative;
  flex-shrink: 0;
}

/* ═══ Characters Canvas ═══ */
.char-canvas {
  width: 56px;
  height: 56px;
  position: relative;
  flex-shrink: 0;
}

.char-canvas svg {
  width: 100%;
  height: 100%;
}

/* ═══ Speech Bubble ═══ */
.speech-bubble {
  position: relative;
  background: #1c2333;
  border: 1px solid #58a6ff44;
  border-radius: 10px;
  padding: 5px 12px;
  font-size: 13px;
  color: #c9d1d9;
  white-space: nowrap;
  max-width: 220px;
  overflow: hidden;
  text-overflow: ellipsis;
  opacity: 0;
  transform: translateY(4px) scale(0.95);
  transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  pointer-events: none;
}
.speech-bubble.show {
  opacity: 1;
  transform: translateY(0) scale(1);
}
.speech-bubble::before {
  content: '';
  position: absolute;
  left: -6px;
  top: 50%;
  transform: translateY(-50%);
  border: 6px solid transparent;
  border-right-color: #1c2333;
}
.speech-bubble .status-dot {
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  margin-right: 5px;
  animation: pulse-dot 1.5s ease-in-out infinite;
}

/* ═══ Spacer & Buttons ═══ */
.spacer { flex: 1; }

.btn {
  padding: 5px 12px;
  border-radius: 5px;
  border: 1px solid #30363d;
  background: #21262d;
  color: #c9d1d9;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.btn:hover { background: #1c2128; border-color: #58a6ff55; }
.btn-sm { padding: 3px 10px; font-size: 12px; }

/* ═══ Status Text ═══ */
.status-text {
  font-size: 12px;
  color: #6e7681;
  letter-spacing: 0.3px;
  transition: color 0.3s;
}

/* ═══ Main Content ═══ */
.main {
  flex: 1;
  display: flex;
  overflow: hidden;
}

.chat-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 20px;
}

/* ═══ Statusbar ═══ */
.statusbar {
  height: 26px;
  background: #161b22;
  border-top: 1px solid #30363d;
  display: flex;
  align-items: center;
  padding: 0 14px;
  gap: 14px;
  font-size: 12px;
  color: #8b949e;
  flex-shrink: 0;
}
.statusbar .dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
}
.statusbar .dot.green { background: #3fb950; }

/* ═══ Control Panel ═══ */
.control-panel {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 8px;
  padding: 16px 20px;
  margin-bottom: 16px;
}
.control-panel h3 {
  font-size: 13px;
  color: #8b949e;
  margin-bottom: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.state-buttons {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}
.state-btn {
  padding: 5px 12px;
  border-radius: 5px;
  border: 1px solid #30363d;
  background: #0d1117;
  color: #8b949e;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
}
.state-btn:hover { border-color: #58a6ff77; color: #c9d1d9; }
.state-btn.active {
  background: #1f3a5f;
  border-color: #58a6ff;
  color: #58a6ff;
}
.custom-msg-input {
  display: flex;
  gap: 8px;
  align-items: center;
}
.custom-msg-input input {
  flex: 1;
  background: #0d1117;
  border: 1px solid #30363d;
  border-radius: 5px;
  padding: 5px 10px;
  color: #c9d1d9;
  font-size: 13px;
  outline: none;
}
.custom-msg-input input:focus {
  border-color: #58a6ff;
}

/* ═══ Demo Chat Messages ═══ */
.demo-chat {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding: 16px 20px;
  background: rgba(22,27,34,0.6);
  border: 1px solid #30363d44;
  border-radius: 8px;
  margin-bottom: 12px;
}
.msg {
  padding: 8px 14px;
  border-radius: 8px;
  max-width: 70%;
  font-size: 13px;
  line-height: 1.5;
}
.msg.user {
  align-self: flex-end;
  background: #1f3a5f;
  border: 1px solid #58a6ff44;
}
.msg.agent {
  align-self: flex-start;
  background: #1c2333;
  border: 1px solid #30363d;
}

/* ═══ Animations ═══ */
@keyframes pulse-dot {
  0%, 100% { opacity: 0.4; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.2); }
}

/* ═══ Particle Effects ═══ */
.particle {
  animation: float-particle 3s ease-in-out infinite;
}
.particle:nth-child(2) { animation-delay: 0.8s; }
.particle:nth-child(3) { animation-delay: 1.6s; }
.particle:nth-child(4) { animation-delay: 0.4s; }

@keyframes float-particle {
  0%, 100% { transform: translateY(0) translateX(0); opacity: 0.5; }
  25% { transform: translateY(-3px) translateX(2px); opacity: 0.8; }
  50% { transform: translateY(-1px) translateX(-1px); opacity: 0.6; }
  75% { transform: translateY(-4px) translateX(1px); opacity: 0.9; }
}

/* Line art animation for the character */
.char-body { transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
.char-face { transition: all 0.3s ease; }

/* Greeting: arm wave */
@keyframes wave-arm {
  0%, 100% { transform: rotate(-5deg); }
  25% { transform: rotate(15deg); }
  50% { transform: rotate(-5deg); }
  75% { transform: rotate(10deg); }
}
.char-waving .arm-right { animation: wave-arm 0.8s ease-in-out 2; transform-origin: 20px 28px; }

/* Thinking: bounce slightly */
@keyframes think-bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-1.5px) scale(1.02); }
}
.char-thinking { animation: think-bounce 0.8s ease-in-out infinite; }

/* Idle: subtle breathing */
@keyframes breathe {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.015); }
}
.char-idle { animation: breathe 3s ease-in-out infinite; }

/* Done: celebrate */
@keyframes celebrate {
  0% { transform: scale(1); }
  20% { transform: scale(1.08); }
  40% { transform: scale(1); }
  60% { transform: scale(1.05); }
  80% { transform: scale(1); }
  100% { transform: scale(1); }
}
.char-done { animation: celebrate 0.6s ease-out 1; }

/* Error: shake */
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-2px) rotate(-2deg); }
  40% { transform: translateX(2px) rotate(2deg); }
  60% { transform: translateX(-1px) rotate(-1deg); }
  80% { transform: translateX(1px) rotate(1deg); }
}
.char-error { animation: shake 0.4s ease-in-out 2; }

/* Aura glow */
@keyframes aura-pulse {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 0.6; }
}
.aura-glow { animation: aura-pulse 2s ease-in-out infinite; }

/* ═══ Responsive ═══ */
@media (max-width: 768px) {
  .topbar { height: auto; min-height: 56px; flex-wrap: wrap; gap: 8px; padding: 6px 12px; }
  .speech-bubble { max-width: 140px; font-size: 11px; }
  .char-canvas { width: 44px; height: 44px; }
}
</style>
</head>
<body>

<!-- ═══ Topbar ═══ -->
<div class="topbar">
  <div class="logo-group">
    <svg viewBox="0 0 40 40" width="30" height="30">
      <polygon points="20,3 38,35 2,35" fill="none" stroke="#58a6ff" stroke-width="2.5" stroke-linejoin="round"/>
      <polygon points="20,11 31,32 9,32" fill="rgba(88,166,255,0.12)" stroke="#58a6ff" stroke-width="1.5" stroke-linejoin="round"/>
      <line x1="20" y1="20" x2="20" y2="27" stroke="#58a6ff" stroke-width="2" stroke-linecap="round"/>
      <circle cx="20" cy="18" r="2.5" fill="#58a6ff"/>
    </svg>
    <span class="logo-text">坐山客</span>
  </div>

  <!-- ▼▲▼ Character Area — 核心角色区 ▼▲▼ -->
  <div class="character-area" id="characterArea">
    <div class="char-canvas" id="charCanvas">
      <svg viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="auraGrad" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#ffd700" stop-opacity="0.25"/>
            <stop offset="60%" stop-color="#c8a84e" stop-opacity="0.08"/>
            <stop offset="100%" stop-color="#a08030" stop-opacity="0"/>
          </radialGradient>
          <radialGradient id="glowParticle" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#ffd700" stop-opacity="0.9"/>
            <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
          </radialGradient>
          <filter id="softGlow">
            <feGaussianBlur stdDeviation="0.5" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>

        <!-- 灵气光环 -->
        <circle cx="28" cy="30" r="22" fill="url(#auraGrad)" class="aura-glow"/>

        <!-- 灵气粒子 -->
        <circle cx="10" cy="20" r="1.2" fill="#ffd700" opacity="0.6" class="particle" filter="url(#softGlow)"/>
        <circle cx="45" cy="18" r="1" fill="#f0c040" opacity="0.5" class="particle" filter="url(#softGlow)"/>
        <circle cx="8" cy="38" r="0.8" fill="#ffd700" opacity="0.4" class="particle" filter="url(#softGlow)"/>
        <circle cx="48" cy="36" r="0.9" fill="#c8a84e" opacity="0.5" class="particle" filter="url(#softGlow)"/>

        <!-- 身体（盘坐） -->
        <g class="char-body" id="charBody">
          <!-- 盘腿 -->
          <ellipse cx="28" cy="46" rx="12" ry="6" fill="none" stroke="#a08030" stroke-width="1.2"/>
          <!-- 身体（袍子） -->
          <path d="M20 44 L18 28 Q28 22 38 28 L36 44" fill="none" stroke="#c8a84e" stroke-width="1.3" stroke-linejoin="round"/>
          <!-- 袍子领口 -->
          <path d="M23 30 L28 25 L33 30" fill="none" stroke="#ffd700" stroke-width="1" stroke-linejoin="round"/>

          <!-- 左手（放在膝盖上） -->
          <path d="M18 38 Q14 40 16 43" fill="none" stroke="#e8c882" stroke-width="1.2" stroke-linecap="round"/>
          <!-- 右手（可动，用来挥手） -->
          <path d="M38 38 Q42 36 40 32" fill="none" stroke="#e8c882" stroke-width="1.2" stroke-linecap="round" id="armRight" class="arm-right"/>
        </g>

        <!-- 头部 -->
        <g class="char-face" id="charFace" filter="url(#softGlow)">
          <!-- 头发（长发：简单流畅线条） -->
          <path d="M20 18 Q16 16 14 20 Q12 16 16 12 Q18 8 22 8 Q24 6 28 6 Q32 6 34 8 Q38 12 40 16 Q42 20 40 24" fill="none" stroke="#4a3a2a" stroke-width="1.5"/>
          <!-- 脸部轮廓 -->
          <ellipse cx="28" cy="18" rx="8" ry="8" fill="none" stroke="#e8c882" stroke-width="1.3"/>
          <!-- 脸颊（浅色） -->
          <ellipse cx="28" cy="18" rx="7.5" ry="7.5" fill="rgba(232,200,130,0.08)"/>

          <!-- 眼睛（默认闭目养神 - idle） -->
          <g id="eyes">
            <!-- 左眼（闭） -->
            <path d="M24 18 Q26 19 28 18" fill="none" stroke="#8b7355" stroke-width="1" stroke-linecap="round" id="eyeL" class="eye-closed"/>
            <!-- 右眼（闭） -->
            <path d="M30 18 Q32 19 34 18" fill="none" stroke="#8b7355" stroke-width="1" stroke-linecap="round" id="eyeR" class="eye-closed"/>
          </g>

          <!-- 嘴巴（默认微笑） -->
          <path d="M26 22 Q28 23.5 30 22" fill="none" stroke="#8b7355" stroke-width="0.8" stroke-linecap="round" id="mouth"/>

          <!-- 刘海 -->
          <path d="M22 13 Q23 10 25 11 Q26 9 28 10 Q30 9 32 11 Q34 10 34 13" fill="none" stroke="#5a4a3a" stroke-width="1" stroke-linecap="round"/>
        </g>
      </svg>
    </div>

    <!-- 对话气泡 -->
    <div class="speech-bubble" id="speechBubble">
      <span class="status-dot" id="statusDot" style="background:#3fb950;"></span>
      <span id="speechText">静候差遣...</span>
    </div>
  </div>

  <span class="spacer"></span>

  <button class="btn btn-sm">🧠 Thinking Map</button>
  <button class="btn btn-sm">⚡ Action Map</button>
  <button class="btn btn-sm">⚙</button>
</div>

<!-- ═══ Main Content ═══ -->
<div class="main">
  <div class="chat-panel">

    <!-- 控制面板 - 展示各种状态 -->
    <div class="control-panel">
      <h3>🎭 坐山客 表情/状态演示</h3>
      <div class="state-buttons">
        <button class="state-btn active" data-state="idle" onclick="setState('idle')">🧘 空闲</button>
        <button class="state-btn" data-state="greeting" onclick="setState('greeting')">👋 打招呼</button>
        <button class="state-btn" data-state="thinking" onclick="setState('thinking')">🤔 思考中</button>
        <button class="state-btn" data-state="working" onclick="setState('working')">⚡ 工作中</button>
        <button class="state-btn" data-state="done" onclick="setState('done')">✅ 完成了</button>
        <button class="state-btn" data-state="error" onclick="setState('error')">⚠️ 出错了</button>
        <button class="state-btn" data-state="notify" onclick="setState('notify')">🔔 通知</button>
      </div>
      <div class="custom-msg-input">
        <span style="font-size:12px; color:#6e7681; flex-shrink:0;">自定义气泡:</span>
        <input type="text" id="customMsg" placeholder="输入你想让坐山客说的话..." value="天气查询已完成，今日晴，24°C">
        <button class="btn btn-sm" onclick="setCustomMessage()">发送</button>
      </div>
    </div>

    <!-- 模拟聊天 -->
    <div class="demo-chat" id="demoChat">
      <div class="msg agent">
        👋 清泉，又见面了。今天想聊点什么？
      </div>
      <div class="msg user">
        查一下今天北京的天气
      </div>
      <div class="msg agent" id="thinkingMsg">
        🤔 让我看看...
      </div>
    </div>
  </div>
</div>

<!-- ═══ Statusbar ═══ -->
<div class="statusbar">
  <span class="dot green"></span>
  坐山客 v0.3 · 角色动画
  <span>|</span>
  API: http://localhost:8000
  <span>|</span>
  角色状态: <span id="statusBarState">空闲</span>
</div>

<script>
// ═══ State Machine ═══
const states = {
  idle: {
    label: '空闲',
    bubble: '静候差遣...',
    bubbleShow: true,
    color: '#3fb950',
    charClass: 'char-idle',
    face: { eyes: 'closed', mouth: 'smile' },
  },
  greeting: {
    label: '打招呼',
    bubble: '清泉，我来了 👋',
    bubbleShow: true,
    color: '#58a6ff',
    charClass: 'char-waving',
    face: { eyes: 'open', mouth: 'smile' },
  },
  thinking: {
    label: '思考中',
    bubble: '让我想想...',
    bubbleShow: true,
    color: '#d29922',
    charClass: 'char-thinking',
    face: { eyes: 'side', mouth: 'pursed' },
  },
  working: {
    label: '工作中',
    bubble: '正在处理，稍等一下...',
    bubbleShow: true,
    color: '#bc8cff',
    charClass: 'char-thinking',
    face: { eyes: 'open', mouth: 'neutral' },
  },
  done: {
    label: '完成了',
    bubble: '搞定！✅',
    bubbleShow: true,
    color: '#3fb950',
    charClass: 'char-done',
    face: { eyes: 'happy', mouth: 'bigSmile' },
  },
  error: {
    label: '出错了',
    bubble: '出了点状况... ⚠️',
    bubbleShow: true,
    color: '#f85149',
    charClass: 'char-error',
    face: { eyes: 'worried', mouth: 'frown' },
  },
  notify: {
    label: '通知',
    bubble: '有新发现！',
    bubbleShow: true,
    color: '#58a6ff',
    charClass: 'char-idle',
    face: { eyes: 'open', mouth: 'smile' },
  },
};

let currentState = 'idle';

// SVG element references
const svg = document.querySelector('.char-canvas svg');

function updateFace(state) {
  const face = state.face;
  const eyeL = svg.getElementById('eyeL');
  const eyeR = svg.getElementById('eyeR');
  const mouth = svg.getElementById('mouth');

  // Eyes
  if (face.eyes === 'closed') {
    eyeL.setAttribute('d', 'M24 18 Q26 19 28 18');
    eyeR.setAttribute('d', 'M30 18 Q32 19 34 18');
    eyeL.setAttribute('stroke', '#8b7355');
    eyeR.setAttribute('stroke', '#8b7355');
  } else if (face.eyes === 'open') {
    eyeL.setAttribute('d', 'M23.5 17 Q25 15.5 26.5 17');
    eyeR.setAttribute('d', 'M29.5 17 Q31 15.5 32.5 17');
    eyeL.setAttribute('stroke', '#5a4a3a');
    eyeR.setAttribute('stroke', '#5a4a3a');
  } else if (face.eyes === 'side') {
    // Looking up/right - thinking
    eyeL.setAttribute('d', 'M23.5 17 Q24.5 16 25.5 17');
    eyeR.setAttribute('d', 'M29.5 17 Q30.5 16 31.5 17');
    eyeL.setAttribute('stroke', '#5a4a3a');
    eyeR.setAttribute('stroke', '#5a4a3a');
  } else if (face.eyes === 'happy') {
    // Happy squint
    eyeL.setAttribute('d', 'M23.5 17 Q25 16.5 26.5 17');
    eyeR.setAttribute('d', 'M29.5 17 Q31 16.5 32.5 17');
    eyeL.setAttribute('stroke', '#5a4a3a');
    eyeR.setAttribute('stroke', '#5a4a3a');
  } else if (face.eyes === 'worried') {
    eyeL.setAttribute('d', 'M23.5 18 Q25 19 26.5 18');
    eyeR.setAttribute('d', 'M29.5 18 Q31 19 32.5 18');
    eyeL.setAttribute('stroke', '#5a4a3a');
    eyeR.setAttribute('stroke', '#5a4a3a');
  }

  // Mouth
  if (face.mouth === 'smile') {
    mouth.setAttribute('d', 'M26 22 Q28 23.5 30 22');
    mouth.setAttribute('stroke', '#8b7355');
  } else if (face.mouth === 'bigSmile') {
    mouth.setAttribute('d', 'M25 22 Q28 25 31 22');
    mouth.setAttribute('stroke', '#8b7355');
  } else if (face.mouth === 'neutral') {
    mouth.setAttribute('d', 'M26 22 L30 22');
    mouth.setAttribute('stroke', '#8b7355');
  } else if (face.mouth === 'pursed') {
    mouth.setAttribute('d', 'M26.5 22 Q28 21.5 29.5 22');
    mouth.setAttribute('stroke', '#8b7355');
  } else if (face.mouth === 'frown') {
    mouth.setAttribute('d', 'M26 23 Q28 21.5 30 23');
    mouth.setAttribute('stroke', '#8b7355');
  }
}

function setState(stateName) {
  const state = states[stateName];
  if (!state) return;

  currentState = stateName;

  // Update buttons
  document.querySelectorAll('.state-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.state === stateName);
  });

  // Update character class
  const charCanvas = document.getElementById('charCanvas');
  charCanvas.className = 'char-canvas ' + state.charClass;

  // Update face
  updateFace(state);

  // Update bubble
  const bubble = document.getElementById('speechBubble');
  const text = document.getElementById('speechText');
  const dot = document.getElementById('statusDot');

  text.textContent = state.bubble;
  dot.style.background = state.color;
  bubble.classList.toggle('show', state.bubbleShow);

  // Update status bar
  document.getElementById('statusBarState').textContent = state.label;
}

function setCustomMessage() {
  const input = document.getElementById('customMsg');
  const msg = input.value.trim();
  if (!msg) return;

  const bubble = document.getElementById('speechBubble');
  document.getElementById('speechText').textContent = msg;
  bubble.classList.add('show');

  // Also show the character looking at user (notify-like)
  setState('notify');
  document.getElementById('statusBarState').textContent = '说话中';
}

// ═══ Auto-demo: cycle through states ═══
function autoDemo() {
  const sequence = ['idle', 'greeting', 'thinking', 'working', 'done', 'thinking', 'error', 'notify', 'idle'];
  let i = 0;

  setState('idle');

  setInterval(() => {
    i = (i + 1) % sequence.length;
    setState(sequence[i]);
  }, 3000);
}

// Start
setState('idle');
