<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>坐山客 — 自省地图原型</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #020617;
  color: #e2e8f0;
  font-family: 'JetBrains Mono', 'Noto Sans SC', monospace;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Header */
header {
  background: #0f172a;
  border-bottom: 1px solid #1e293b;
  padding: 16px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-shrink: 0;
}
header h1 {
  font-size: 18px;
  font-weight: 600;
  background: linear-gradient(135deg, #22d3ee, #34d399);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.desc {
  color: #64748b;
  font-size: 12px;
}
.desc em { color: #94a3b8; font-style: normal; }

/* Breadcrumb */
.breadcrumb {
  background: #0f172a;
  padding: 8px 24px;
  border-bottom: 1px solid #1e293b;
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  flex-shrink: 0;
  min-height: 36px;
}
.breadcrumb span { color: #64748b; cursor: pointer; padding: 2px 6px; border-radius: 4px; transition: all 0.2s; }
.breadcrumb span:hover { color: #22d3ee; background: rgba(34,211,238,0.1); }
.breadcrumb .sep { color: #334155; cursor: default; padding: 0; }
.breadcrumb span.active { color: #34d399; font-weight: 600; }

/* Main map area */
#map-container {
  flex: 1;
  position: relative;
  overflow: hidden;
}
#map-canvas {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}

/* Level indicator */
.level-badge {
  position: absolute;
  top: 12px; right: 16px;
  background: rgba(30,41,59,0.8);
  border: 1px solid #1e293b;
  padding: 4px 10px;
  border-radius: 12px;
  font-size: 11px;
  color: #64748b;
  pointer-events: none;
}

/* View toggle */
.view-toggle {
  display: flex;
  gap: 0;
  margin-left: auto;
  border: 1px solid #1e293b;
  border-radius: 6px;
  overflow: hidden;
}
.view-btn {
  background: #0f172a;
  color: #64748b;
  border: none;
  padding: 5px 12px;
  font-size: 11px;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
}
.view-btn.active { background: rgba(34,211,238,0.15); color: #22d3ee; }
.view-btn:hover:not(.active) { color: #94a3b8; }
.view-btn + .view-btn { border-left: 1px solid #1e293b; }

/* Node styles */
.node {
  position: absolute;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border-radius: 8px;
  border: 1.5px solid;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  overflow: hidden;
  text-align: center;
  padding: 8px;
}
.node:hover {
  filter: brightness(1.3);
  transform: scale(1.04);
  z-index: 10 !important;
}
.node .icon { font-size: 20px; margin-bottom: 4px; line-height: 1; }
.node .label { font-size: 11px; font-weight: 500; line-height: 1.3; }
.node .sublabel { font-size: 9px; color: #64748b; margin-top: 2px; line-height: 1.2; }
.node .token { font-size: 8px; color: #475569; margin-top: 2px; }
.node .status-dot {
  position: absolute;
  top: 6px; right: 6px;
  width: 6px; height: 6px; border-radius: 50%;
}

/* Node types */
.node-frontend { background: rgba(8,51,68,0.4); border-color: #22d3ee; }
.node-backend { background: rgba(6,78,59,0.4); border-color: #34d399; }
.node-database { background: rgba(76,29,149,0.4); border-color: #a78bfa; }
.node-external { background: rgba(30,41,59,0.5); border-color: #94a3b8; }
.node-message { background: rgba(251,146,60,0.3); border-color: #fb923c; }
.node-process { background: rgba(30,41,59,0.5); border-color: #64748b; }
.node-layer { background: rgba(6,78,59,0.35); border-color: #34d399; }
.node-highlight { background: rgba(34,211,238,0.12); border-color: #22d3ee; }
.node-arrow { border: none; background: none; cursor: default; }
.node-arrow:hover { transform: none; filter: none; }

/* Arrow SVG layer */
#arrows-layer {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 1;
}
#arrows-layer svg { width: 100%; height: 100%; }

/* Grid background */
#grid-bg {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 0;
  opacity: 0.3;
}

/* Info panel */
#info-panel {
  position: absolute;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(15,23,42,0.92);
  border: 1px solid #1e293b;
  border-radius: 10px;
  padding: 12px 20px;
  font-size: 12px;
  color: #94a3b8;
  max-width: 500px;
  text-align: center;
  backdrop-filter: blur(8px);
  pointer-events: none;
  transition: opacity 0.3s;
}
#info-panel strong { color: #e2e8f0; }

/* Transition effect */
.fade-enter { opacity: 0; transform: scale(0.95); }
.fade-enter-active { opacity: 1; transform: scale(1); }

/* Connection labels */
.conn-label {
  position: absolute;
  font-size: 8px;
  color: #475569;
  pointer-events: none;
  z-index: 2;
  text-align: center;
}

/* SVG chevron/down indicator on drillable nodes */
.drill-icon {
  position: absolute;
  bottom: 4px; right: 6px;
  font-size: 8px;
  color: #475569;
  opacity: 0.6;
}

@media (max-width: 768px) {
  .node .icon { font-size: 16px; }
  .node .label { font-size: 9px; }
  .node .sublabel { font-size: 8px; }
}
</style>
</head>
<body>

<header>
  <h1>⛰️ 坐山客 · 自省地图</h1>
  <span class="desc">系统架构层 → 业务流程层 → 实现细节层 · <em>点击节点钻取</em></span>
  <div class="view-toggle">
    <button class="view-btn active" data-mode="flow" onclick="setViewMode('flow')">流程图</button>
    <button class="view-btn" data-mode="arch" onclick="setViewMode('arch')">架构图</button>
  </div>
</header>

<div class="breadcrumb" id="breadcrumb">
  <span onclick="navigateTo('root')">🌐 系统总览</span>
</div>

<div id="map-container">
  <svg id="grid-bg"><defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
  </defs><rect width="100%" height="100%" fill="url(#grid)"/></svg>

  <div id="map-canvas"></div>
  <div id="arrows-layer"><svg><defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <marker id="arrow-hl" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22d3ee"/>
    </marker>
  </defs></svg></div>

  <div class="level-badge" id="level-badge">L1 · 架构总览</div>
  <div id="info-panel">🖱️ 点击任意模块钻取查看内部流程</div>
</div>

// ═══ 渲染引擎 ═══
let currentView = 'root';
let viewMode = 'flow'; // 'flow' | 'arch'

function setViewMode(mode) {
  viewMode = mode;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  render(currentView);
}

function navigateTo(viewId) {
  if (!views[viewId]) return;
  currentView = viewId;
  render(viewId);
  updateBreadcrumb(viewId);
}

function updateBreadcrumb(viewId) {
  const bc = document.getElementById('breadcrumb');
  const v = views[viewId];
  const crumbs = [{ id: 'root', label: '🌐 系统总览' }];
  
  // Build breadcrumb path
  function collectPath(id) {
    const vv = views[id];
    if (vv && vv.parent && vv.parent !== id) {
      collectPath(vv.parent);
    }
    if (id !== 'root') {
      crumbs.push({ id, label: vv.label });
    }
  }
  if (viewId !== 'root') collectPath(viewId);
  
  bc.innerHTML = crumbs.map((c, i) => {
    const isLast = i === crumbs.length - 1;
    const sep = i > 0 ? '<span class="sep">›</span>' : '';
    return `${sep}<span class="${isLast ? 'active' : ''}" onclick="navigateTo('${c.id}')">${c.label}</span>`;
  }).join('');
}

function render(viewId) {
  const v = views[viewId];
  if (!v) return;
  
  const canvas = document.getElementById('map-canvas');
  const arrowsSvg = document.querySelector('#arrows-layer svg');
  const info = document.getElementById('info-panel');
  const badge = document.getElementById('level-badge');
  
  badge.textContent = `${v.level} · ${v.label}`;
  info.innerHTML = v.info;
  
  // Calculate scale to fit all nodes in viewport
  const containerRect = document.getElementById('map-container').getBoundingClientRect();
  const cw = containerRect.width - 40;
  const ch = containerRect.height - 80;
  
  // Find bounding box of all nodes
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  v.nodes.forEach(n => {
    minX = Math.min(minX, n.x);
    minY = Math.min(minY, n.y);
    maxX = Math.max(maxX, n.x + (n.w || 140));
    maxY = Math.max(maxY, n.y + (n.h || 60));
  });
  
  const contentW = maxX - minX + 60;
  const contentH = maxY - minY + 60;
  const scale = Math.min(1, Math.min(cw / contentW, ch / contentH, 1.2));
  const offsetX = (cw - contentW * scale) / 2;
  const offsetY = (ch - contentH * scale) / 2;
  
  // Render nodes
  let nodesHtml = v.nodes.map(n => {
    const nx = offsetX + (n.x - minX + 30) * scale;
    const ny = offsetY + (n.y - minY + 30) * scale;
    const nw = (n.w || 140) * scale;
    const nh = (n.h || 60) * scale;
    const typeClass = `node-${n.type}`;
    const drill = n.drill ? `<div class="drill-icon">⊞</div>` : '';
    const token = n.token ? `<div class="token">~${n.token}</div>` : '';
    
    return `<div class="node ${typeClass}" style="left:${nx}px;top:${ny}px;width:${nw}px;height:${nh}px;font-size:${12*scale}px"
                 onclick="${n.drill ? `navigateTo('${n.view}')` : ''}"
                 title="${n.drill ? '点击钻取查看内部流程' : ''}">
      <div class="icon" style="font-size:${20*scale}px">${n.icon}</div>
      <div class="label" style="font-size:${11*scale}px">${n.label}</div>
      ${n.sub ? `<div class="sublabel" style="font-size:${9*scale}px">${n.sub}</div>` : ''}
      ${token}
      ${drill}
    </div>`;
  }).join('');
  
  canvas.innerHTML = nodesHtml;
  
  // Render arrows (SVG)
  let arrowsHtml = `<defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <marker id="arrow-hl" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22d3ee"/>
    </marker>
  </defs>`;
  
  // Build node position map
  const nodeMap = {};
  v.nodes.forEach(n => {
    nodeMap[n.id] = {
      x: offsetX + (n.x - minX + 30) * scale,
      y: offsetY + (n.y - minY + 30) * scale,
      w: (n.w || 140) * scale,
      h: (n.h || 60) * scale,
    };
  });
  
  v.arrows.forEach(a => {
    const from = nodeMap[a.from];
    const to = nodeMap[a.to];
    if (!from || !to) return;
    
    const x1 = from.x + from.w / 2;
    const y1 = from.y + from.h;
    const x2 = to.x + to.w / 2;
    const y2 = to.y;
    const midY = (y1 + y2) / 2;
    const marker = a.hl ? 'url(#arrow-hl)' : 'url(#arrow)';
    const stroke = a.hl ? '#22d3ee' : '#334155';
    const strokeW = a.hl ? 2 : 1.5;
    const cls = a.hl ? 'hl' : '';
    
    arrowsHtml += `<path d="M ${x1} ${y1} L ${x1} ${midY} L ${x2} ${midY} L ${x2} ${y2}" 
                   fill="none" stroke="${stroke}" stroke-width="${strokeW}" marker-end="${marker}" class="${cls}"/>`;
    
    if (a.label) {
      const lx = (x1 + x2) / 2;
      const ly = midY - 6;
      arrowsHtml += `<text x="${lx}" y="${ly}" text-anchor="middle" fill="#475569" font-size="${8*scale}" font-family="inherit">${a.label}</text>`;
    }
  });
  
  arrowsSvg.innerHTML = arrowsHtml;
}

// ── Handle resize ──
window.addEventListener('resize', () => { render(currentView); });

// ── Handle escape to go up ──
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && currentView !== 'root') {
    const v = views[currentView];
    navigateTo(v.parent || 'root');
  }
});

// ── Handle click on canvas background → go up ──
document.getElementById('map-canvas').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) {
    if (currentView !== 'root') {
      const v = views[currentView];
      navigateTo(v.parent || 'root');
    }
  }
});
