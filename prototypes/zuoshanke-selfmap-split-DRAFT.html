<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>坐山客 · 自省地图（左树右图）</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #020617;
  color: #e2e8f0;
  font-family: 'JetBrains Mono', 'Noto Sans SC', monospace;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

header {
  padding: 14px 20px;
  border-bottom: 1px solid #1e293b;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 12px;
}
header h1 { font-size: 16px; font-weight: 600;
  background: linear-gradient(135deg, #22d3ee, #34d399);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
header .sub { font-size: 11px; color: #475569; margin-left: auto; }

.main { display: flex; flex: 1; overflow: hidden; }

/* ── 左侧树 ── */
#left-panel {
  width: 340px; min-width: 260px;
  border-right: 1px solid #1e293b;
  display: flex; flex-direction: column;
  overflow: hidden;
}
#search-box {
  background: #0f172a; border: none; border-bottom: 1px solid #1e293b;
  padding: 10px 14px; color: #e2e8f0; font-size: 12px;
  font-family: inherit; outline: none; flex-shrink: 0;
}
#search-box::placeholder { color: #475569; }
#search-box:focus { background: #0a0f1e; }

#tree-scroll {
  flex: 1; overflow-y: auto; padding: 8px 0 20px 16px;
}
#tree-scroll::-webkit-scrollbar { width: 6px; }
#tree-scroll::-webkit-scrollbar-track { background: transparent; }
#tree-scroll::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }

.tree { list-style: none; }
.tree ul { list-style: none; padding-left: 20px; }

.tree li { position: relative; padding: 1px 0; }

/* Tree connector lines */
.tree li::before {
  content: ''; position: absolute; left: -13px; top: 0; bottom: 50%;
  width: 10px; border-left: 1.5px solid #1e293b; border-bottom: 1.5px solid #1e293b;
  border-radius: 0 0 0 4px;
}
.tree li:last-child::before { border-left: 1.5px solid #1e293b; border-bottom: 1.5px solid #1e293b; border-radius: 0 0 0 4px; }
.tree li:last-child::after { content: ''; position: absolute; left: -13px; top: 50%; bottom: 0; width: 10px; }
.tree > li::before { display: none; }
.tree > li::after { display: none; }

/* Node */
.node {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 10px 4px 6px; border-radius: 5px;
  cursor: pointer; transition: all 0.12s;
  border: 1px solid transparent; user-select: none;
  font-size: 12px; line-height: 1.4;
  width: calc(100% - 4px);
}
.node:hover { background: rgba(30,41,59,0.5); border-color: #1e293b; }
.node.selected { background: rgba(34,211,238,0.1); border-color: rgba(34,211,238,0.3); }

.node .icon { font-size: 13px; width: 18px; text-align: center; flex-shrink: 0; }
.node .label { color: #e2e8f0; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.node .sublabel { font-size: 10px; color: #475569; margin-left: auto; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 80px; }
.node .leaf-dot { width: 4px; height: 4px; border-radius: 50%; background: #334155; flex-shrink: 0; margin-left: 2px; }
.node .leaf-dot.has-diagram { background: #22d3ee; }

/* Toggle */
.toggle {
  display: inline-flex; align-items: center; justify-content: center;
  width: 14px; height: 14px; font-size: 8px; color: #475569;
  transition: transform 0.2s; flex-shrink: 0;
}
.toggle.expanded { transform: rotate(90deg); }
.toggle.empty { visibility: hidden; }

/* ── 右侧图 ── */
#right-panel {
  flex: 1; display: flex; flex-direction: column;
  overflow: hidden; position: relative;
}
#right-header {
  padding: 10px 20px; border-bottom: 1px solid #1e293b;
  flex-shrink: 0; display: flex; align-items: center; gap: 8px;
}
#right-header .rh-icon { font-size: 18px; }
#right-header .rh-title { font-size: 14px; font-weight: 600; }
#right-header .rh-sub { font-size: 11px; color: #64748b; }
#right-header .rh-badge {
  margin-left: auto; font-size: 10px;
  padding: 2px 8px; border-radius: 8px;
  background: rgba(34,211,238,0.1); color: #22d3ee;
  border: 1px solid rgba(34,211,238,0.2);
}
#right-header .rh-badge.none {
  background: rgba(71,85,105,0.15); color: #475569;
  border-color: #1e293b;
}

#diagram-area {
  flex: 1; position: relative; overflow: hidden;
}
#diagram-canvas {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
}
/* Grid background */
#grid-bg {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none; z-index: 0;
  opacity: 0.25;
}

/* ── 占位 ── */
#empty-state {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  text-align: center; color: #475569;
  font-size: 13px; line-height: 2;
}
#empty-state .big-icon { font-size: 40px; margin-bottom: 8px; }

/* ── Diagrams ── */
.diagram-container {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%; z-index: 1;
}
.diagram-node {
  position: absolute;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  border-radius: 8px; border: 1.5px solid;
  text-align: center; padding: 6px 10px;
  transition: all 0.2s;
  font-size: 12px;
}
.diagram-node:hover { filter: brightness(1.2); }
.diagram-node .di { font-size: 16px; margin-bottom: 2px; }
.diagram-node .dl { font-size: 11px; font-weight: 500; line-height: 1.3; }
.diagram-node .ds { font-size: 9px; color: #64748b; margin-top: 1px; }
.diagram-node .dk { font-size: 8px; color: #475569; margin-top: 1px; }

.dn-highlight { background: rgba(34,211,238,0.1); border-color: #22d3ee; }
.dn-layer { background: rgba(6,78,59,0.3); border-color: #34d399; }
.dn-process { background: rgba(30,41,59,0.4); border-color: #64748b; }
.dn-db { background: rgba(76,29,149,0.3); border-color: #a78bfa; }
.dn-external { background: rgba(30,41,59,0.4); border-color: #94a3b8; }

/* ── Resizer ── */
#resizer {
  width: 4px; cursor: col-resize; flex-shrink: 0;
  background: transparent; position: relative;
}
#resizer:hover, #resizer.active { background: rgba(34,211,238,0.15); }
</style>
</head>
<body>

<header>
  <h1>⛰️ 坐山客 · 自省地图</h1>
  <span class="sub">左树导航 · 右图展示</span>
</header>

<div class="main">
  <!-- 左侧树 -->

    <input id="search-box" type="text" placeholder="搜索模块、文件、参数…" oninput="filterTree(this.value)">
    <div id="tree-scroll"><ul class="tree" id="tree-root"></ul></div>
  </div>
  <div id="resizer"></div>
  <!-- 右侧图 -->
  <div id="right-panel">
    <div id="right-header">
      <span class="rh-icon" id="rh-icon">🏛️</span>

      <span class="rh-sub" id="rh-sub">选择左侧节点查看流程图</span>
      <span class="rh-badge none" id="rh-badge">无流程图</span>
    </div>
    <div id="diagram-area">
      <svg id="grid-bg"><defs>
        <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
          <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#1e293b" stroke-width="0.5"/>

// ═══ 展开所有有 diagram 的节点 ═══
function markDiagramNodes(node) {
  if (node.diagram) node._hasDiagram = true;
  if (node.children) {
    node.children.forEach(markDiagramNodes);
    node._hasDiagram = node.children.some(c => c._hasDiagram) || !!node.diagram;
  }
}
markDiagramNodes(treeData);

// ═══ 渲染树 ═══

function renderTree(node, container) {
  const ul = document.createElement('ul'); ul.className = 'tree';
  (node.children || []).forEach(child => {
    const li = document.createElement('li');
    const hasChildren = child.children && child.children.length > 0;
    const expanded = child.label === 'Agent Core'; // 默认展开

    const nodeDiv = document.createElement('div');
    nodeDiv.className = 'node';
    nodeDiv.dataset.searchText = `${child.icon||''} ${child.label} ${child.sub||''}`.toLowerCase();

    // Toggle
    const toggle = document.createElement('span');
    toggle.className = `toggle ${hasChildren ? (expanded ? 'expanded' : '') : 'empty'}`;
    toggle.textContent = hasChildren ? '▶' : '';
    nodeDiv.appendChild(toggle);

    // Icon
    const icon = document.createElement('span');
    icon.className = 'icon'; icon.textContent = child.icon || '•';
    nodeDiv.appendChild(icon);

    // Label
    const label = document.createElement('span');
    label.className = 'label'; label.textContent = child.label;
    nodeDiv.appendChild(label);

    // Sublabel
    if (child.sub) {
      const sub = document.createElement('span');
      sub.className = 'sublabel'; sub.textContent = child.sub;
      nodeDiv.appendChild(sub);
    }

    // Leaf dot
    if (hasChildren) {
      // nothing
    } else {
      const dot = document.createElement('span');
      dot.className = `leaf-dot${child.diagram ? ' has-diagram' : ''}`;
      nodeDiv.appendChild(dot);
    }

    // Click
    nodeDiv.addEventListener('click', (e) => {
      e.stopPropagation();
      // Select
      document.querySelectorAll('.node.selected').forEach(n => n.classList.remove('selected'));
      nodeDiv.classList.add('selected');
      // Toggle children
      if (hasChildren) {
        const childUl = li.querySelector('ul');
        if (childUl) {
          childUl.style.display = childUl.style.display === 'none' ? '' : 'none';
          toggle.classList.toggle('expanded');
        }
      }
      // Show diagram
      showDiagram(child);
    });

    li.appendChild(nodeDiv);

    if (hasChildren) {
      const childContainer = document.createElement('div');
      renderTree(child, childContainer);
      const childUl = childContainer.querySelector('ul');
      if (childUl) {
        if (!expanded) childUl.style.display = 'none';
        li.appendChild(childUl);
      }
    }
    ul.appendChild(li);
  });
  container.appendChild(ul);
}

// ═══ 显示流程图 ═══

function showDiagram(node) {
  const icon = document.getElementById('rh-icon');
  const title = document.getElementById('rh-title');
  const sub = document.getElementById('rh-sub');
  const badge = document.getElementById('rh-badge');
  const canvas = document.getElementById('diagram-canvas');

  icon.textContent = node.icon || '•';
  title.textContent = node.label || '未知';
  sub.textContent = node.sub || '';

  const diagramId = node.diagram;
  if (!diagramId) {
    badge.textContent = '无流程图';
    badge.className = 'rh-badge none';
    canvas.innerHTML = `<div id="empty-state">
      <div class="big-icon">📋</div>
      <div>${node.label}</div>
      <div style="font-size:11px">暂无流程图 · 可手动补充</div>
    </div>`;
    return;
  }

  const diag = diagrams[diagramId];
  if (!diag) {
    badge.textContent = '无流程图';
    badge.className = 'rh-badge none';
    return;
  }

  badge.textContent = diag.title;
  badge.className = 'rh-badge';

  // Render diagram
  const area = document.getElementById('diagram-area');
  const aw = area.clientWidth - 40;
  const ah = area.clientHeight - 40;

  // Calculate scale
  let maxX = 0, maxY = 0;
  diag.nodes.forEach(n => {
    maxX = Math.max(maxX, n.x + (n.w || 140));
    maxY = Math.max(maxY, n.y + (n.h || 44) + 20);
  });
  const scale = Math.min(1, Math.min(aw / maxX, ah / maxY, 1.3));

  let html = '';
  const positions = {};

  diag.nodes.forEach(n => {
    const nx = 20 + n.x * scale;
    const ny = 20 + n.y * scale;
    const nw = (n.w || 140) * scale;
    const nh = (n.h || 44) * scale;
    positions[n.id] = { x: nx, y: ny, w: nw, h: nh };

    const cls = { highlight:'dn-highlight', layer:'dn-layer', process:'dn-process', db:'dn-db', external:'dn-external' }[n.type] || 'dn-process';
    const fs = Math.max(9, 12 * scale);
    const ifs = Math.max(12, 16 * scale);

    html += `<div class="diagram-node ${cls}" style="left:${nx}px;top:${ny}px;width:${nw}px;height:${nh}px;font-size:${fs}px">
      <div class="di" style="font-size:${ifs}px">${n.icon}</div>
      <div class="dl">${n.label}</div>
      ${n.sub ? `<div class="ds">${n.sub}</div>` : ''}
      ${n.token ? `<div class="dk">~${n.token}</div>` : ''}
    </div>`;
  });

  // Arrows as SVG
  let svgArrows = `<svg style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0">
    <defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker></defs>`;
  (diag.arrows || []).forEach(([fromId, toId]) => {
    const f = positions[fromId], t = positions[toId];
    if (!f || !t) return;
    const x1 = f.x + f.w/2, y1 = f.y + f.h;
    const x2 = t.x + t.w/2, y2 = t.y;
    const mid = (y1 + y2) / 2;
    svgArrows += `<path d="M ${x1} ${y1} L ${x1} ${mid} L ${x2} ${mid} L ${x2} ${y2}" fill="none" stroke="#334155" stroke-width="1.5" marker-end="url(#a)"/>`;
  });
  svgArrows += '</svg>';

  canvas.innerHTML = svgArrows + html;
}

// ═══ 搜索 ═══

function filterTree(query) {
  const q = query.toLowerCase().trim();
  document.querySelectorAll('.tree .node').forEach(n => {
    const text = n.dataset.searchText || '';
    const li = n.closest('li');
    if (!q) { li.style.display = ''; return; }
    const match = text.includes(q);
    li.style.display = match ? '' : 'none';
    if (match) {
      let parent = li.parentElement?.closest('li');
      while (parent) {
        const ul = parent.querySelector('ul');
        if (ul) ul.style.display = '';
        const tog = parent.querySelector('.toggle');
        if (tog) tog.classList.add('expanded');
        parent = parent.parentElement?.closest('li');
      }
    }
  });
}

// ═══ Resizer ═══

const resizer = document.getElementById('resizer');
const leftPanel = document.getElementById('left-panel');
let resizing = false;

resizer.addEventListener('mousedown', (e) => {
  resizing = true; resizer.classList.add('active');
  e.preventDefault();
});
document.addEventListener('mousemove', (e) => {
  if (!resizing) return;
  const w = Math.max(200, Math.min(500, e.clientX));
  leftPanel.style.width = w + 'px';
});
document.addEventListener('mouseup', () => {
  resizing = false; resizer.classList.remove('active');
});

// ═══ Init ═══
renderTree(treeData, document.getElementById('tree-root'));

// 默认选中后端层
const backendNode = document.querySelector('.tree > ul > li:nth-child(3) > .node');
if (backendNode) backendNode.click();

// ═══ Keyboard ═══
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    document.querySelectorAll('.node.selected').forEach(n => n.classList.remove('selected'));
    document.getElementById('rh-icon').textContent = '🏛️';
    document.getElementById('rh-title').textContent = '坐山客系统';
    document.getElementById('rh-sub').textContent = '选择左侧节点查看流程图';
    document.getElementById('rh-badge').className = 'rh-badge none';
    document.getElementById('rh-badge').textContent = '无流程图';
    document.getElementById('diagram-canvas').innerHTML = `<div id="empty-state"><div class="big-icon">🗺️</div><div>选择左侧树中的节点</div><div style="font-size:11px">查看对应的流程图</div></div>`;
  }
});
</script>
