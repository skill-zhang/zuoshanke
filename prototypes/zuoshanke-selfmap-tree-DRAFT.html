<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>坐山客 · 自省地图（树形版）</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #020617;
  color: #e2e8f0;
  font-family: 'JetBrains Mono', 'Noto Sans SC', monospace;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

header {
  padding: 20px 28px 12px;
  border-bottom: 1px solid #1e293b;
  flex-shrink: 0;
}
header h1 {
  font-size: 18px;
  font-weight: 600;
  background: linear-gradient(135deg, #22d3ee, #34d399);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 4px;
}
header .sub {
  font-size: 12px;
  color: #64748b;
}

#tree-container {
  flex: 1;
  overflow-y: auto;
  padding: 16px 28px 40px;
}

/* Tree structure */
.tree { list-style: none; padding-left: 0; }
.tree ul { list-style: none; padding-left: 28px; }

.tree li {
  position: relative;
  padding: 3px 0;
}

/* Tree line connector */
.tree li::before {
  content: '';
  position: absolute;
  left: -18px;
  top: 0;
  bottom: 50%;
  width: 14px;
  border-left: 1.5px solid #1e293b;
  border-bottom: 1.5px solid #1e293b;
  border-radius: 0 0 0 4px;
}
.tree li:last-child::before {
  border-left: 1.5px solid #1e293b;
  border-bottom: 1.5px solid #1e293b;
  border-radius: 0 0 0 4px;
}
.tree li:last-child::after {
  content: '';
  position: absolute;
  left: -18px;
  top: 50%;
  bottom: 0;
  width: 14px;
}
.tree > li::before { display: none; }
.tree > li::after { display: none; }
.tree ul > li:only-child::before { border-radius: 0 0 0 4px; }

/* Node content */
.node {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 5px 12px 5px 8px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s;
  border: 1px solid transparent;
  user-select: none;
  position: relative;
  font-size: 13px;
  line-height: 1.4;
}
.node:hover {
  background: rgba(30, 41, 59, 0.6);
  border-color: #1e293b;
}

/* Level colors */
.node.level-1 { border-left: 3px solid #22d3ee; }
.node.level-2 { border-left: 3px solid #34d399; }
.node.level-3 { border-left: 3px solid #a78bfa; }
.node.level-4 { border-left: 3px solid #fbbf24; }

.node .icon { font-size: 15px; width: 22px; text-align: center; flex-shrink: 0; }
.node .label { color: #e2e8f0; font-weight: 500; }
.node .sublabel { font-size: 11px; color: #64748b; margin-left: 4px; }
.node .tag {
  font-size: 9px;
  padding: 1px 6px;
  border-radius: 8px;
  margin-left: 6px;
  background: rgba(30,41,59,0.8);
  color: #64748b;
}
.node .tag.cyan { background: rgba(34,211,238,0.12); color: #22d3ee; }
.node .tag.green { background: rgba(52,211,153,0.12); color: #34d399; }
.node .tag.purple { background: rgba(167,139,250,0.12); color: #a78bfa; }
.node .tag.amber { background: rgba(251,191,36,0.12); color: #fbbf24; }
.node .tag.rose { background: rgba(251,113,133,0.12); color: #fb7185; }

/* Toggle arrow */
.toggle {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 16px;
  height: 16px;
  font-size: 10px;
  color: #475569;
  transition: transform 0.2s;
  flex-shrink: 0;
  margin-right: 2px;
}
.toggle.expanded { transform: rotate(90deg); }
.toggle.empty { visibility: hidden; }

/* Detail panel */
#detail-panel {
  display: none;
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 480px;
  max-width: 90vw;
  max-height: 70vh;
  background: #0f172a;
  border: 1px solid #1e293b;
  border-radius: 12px;
  padding: 20px 24px;
  z-index: 100;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  overflow-y: auto;
}
#detail-panel.show { display: block; }
#detail-backdrop {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.5);
  z-index: 99;
}
#detail-backdrop.show { display: block; }
#detail-panel h2 { font-size: 16px; margin-bottom: 8px; }
#detail-panel h2 .di { margin-right: 8px; }
#detail-panel .d-sub { font-size: 12px; color: #64748b; margin-bottom: 12px; }
#detail-panel .d-section { margin-top: 14px; }
#detail-panel .d-section h3 { font-size: 12px; color: #64748b; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
#detail-panel table { width: 100%; font-size: 12px; border-collapse: collapse; }
#detail-panel td { padding: 4px 8px; border-bottom: 1px solid #1e293b; color: #94a3b8; }
#detail-panel td:first-child { color: #64748b; width: 100px; }
#detail-panel .close-btn {
  position: absolute;
  top: 12px; right: 16px;
  background: none;
  border: none;
  color: #64748b;
  font-size: 18px;
  cursor: pointer;
}
#detail-panel .close-btn:hover { color: #e2e8f0; }

/* Search */
#search-box {
  background: #0f172a;
  border: 1px solid #1e293b;
  border-radius: 6px;
  padding: 8px 14px;
  color: #e2e8f0;
  font-size: 12px;
  font-family: inherit;
  width: 240px;
  outline: none;
  transition: border-color 0.2s;
  margin-bottom: 8px;
}
#search-box:focus { border-color: #22d3ee; }
#search-box::placeholder { color: #475569; }

/* Scrollbar */
#tree-container::-webkit-scrollbar { width: 8px; }
#tree-container::-webkit-scrollbar-track { background: transparent; }
#tree-container::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
#tree-container::-webkit-scrollbar-thumb:hover { background: #334155; }

/* Highlight match */
.node.highlight {
  background: rgba(34,211,238,0.15) !important;
  border-color: #22d3ee !important;
}

/* Count badge */
.count-badge {
  font-size: 10px;
  color: #475569;
  margin-left: 4px;
}
</style>
</head>

<div id="detail-panel">

// ═══ 渲染引擎 ═══

function renderTree(node, container) {
  const ul = document.createElement('ul');
  ul.className = 'tree';

  (node.children || []).forEach(child => {
    const li = document.createElement('li');
    const hasChildren = child.children && child.children.length > 0;
    const expanded = child.level <= 2; // 默认展开到 L2

    // Node div
    const nodeDiv = document.createElement('div');
    nodeDiv.className = `node level-${child.level}`;
    nodeDiv.dataset.id = child.id;
    nodeDiv.dataset.searchText = `${child.icon} ${child.label} ${child.sub || ''} ${(child.detail ? child.detail.desc || child.detail.fields.map(f=>f[1]).join(' ') : '')}`.toLowerCase();

    // Toggle
    const toggle = document.createElement('span');
    toggle.className = `toggle ${hasChildren ? (expanded ? 'expanded' : '') : 'empty'}`;
    toggle.textContent = hasChildren ? '▶' : '';
    nodeDiv.appendChild(toggle);

    // Icon
    const icon = document.createElement('span');
    icon.className = 'icon';
    icon.textContent = child.icon;
    nodeDiv.appendChild(icon);

    // Label
    const label = document.createElement('span');
    label.className = 'label';
    label.textContent = child.label;
    nodeDiv.appendChild(label);

    // Sublabel
    if (child.sub) {
      const sub = document.createElement('span');
      sub.className = 'sublabel';
      sub.textContent = child.sub;
      nodeDiv.appendChild(sub);
    }

    // Tag
    if (child.tag && child.tagText) {
      const tag = document.createElement('span');
      tag.className = `tag ${child.tag}`;
      tag.textContent = child.tagText;
      nodeDiv.appendChild(tag);
    }

    // Click: toggle children
    nodeDiv.addEventListener('click', (e) => {
      e.stopPropagation();
      if (hasChildren) {
        const childUl = li.querySelector('ul');
        if (childUl) {
          childUl.style.display = childUl.style.display === 'none' ? '' : 'none';
          toggle.classList.toggle('expanded');
        }
      }
      // Show detail if available
      if (child.detail) {
        showDetail(child);
      }
    });

    li.appendChild(nodeDiv);

    // Children
    if (hasChildren) {
      const childContainer = document.createElement('div');
      renderTree(child, childContainer);
      const childUl = childContainer.querySelector('ul');
      if (childUl) {
        if (!expanded) childUl.style.display = 'none';
        li.appendChild(childUl);
      }
    }

    ul.appendChild(li);
  });

  container.appendChild(ul);
}

// ═══ Detail Panel ═══

function showDetail(node) {
  const panel = document.getElementById('detail-panel');
  const backdrop = document.getElementById('detail-backdrop');
  const content = document.getElementById('detail-content');

  const d = node.detail;
  let html = `<h2><span class="di">${node.icon}</span>${node.label}</h2>`;
  if (node.sub) html += `<div class="d-sub">${node.sub}</div>`;
  if (d.desc) html += `<p style="font-size:13px;color:#94a3b8;line-height:1.6;margin-top:4px">${d.desc}</p>`;

  if (d.fields && d.fields.length > 0) {
    html += `<div class="d-section"><h3>参数</h3><table>`;
    d.fields.forEach(f => {
      html += `<tr><td>${f[0]}</td><td>${f[1]}</td></tr>`;
    });
    html += `</table></div>`;
  }

  if (d.code) {
    html += `<div class="d-section"><h3>代码路径</h3><div style="font-size:12px;color:#22d3ee;background:rgba(34,211,238,0.06);padding:8px 12px;border-radius:6px;border:1px solid rgba(34,211,238,0.15)">${d.code}</div></div>`;
  }

  content.innerHTML = html;
  panel.classList.add('show');
  backdrop.classList.add('show');
}

function hideDetail() {
  document.getElementById('detail-panel').classList.remove('show');
  document.getElementById('detail-backdrop').classList.remove('show');
}

// ═══ Search ═══

function filterTree(query) {
  const q = query.toLowerCase().trim();
  document.querySelectorAll('.tree .node').forEach(n => {
    const text = n.dataset.searchText || '';
    const li = n.closest('li');
    if (!q) {
      n.classList.remove('highlight');
      li.style.display = '';
      return;
    }
    const match = text.includes(q);
    n.classList.toggle('highlight', match);
    li.style.display = match ? '' : 'none';
    
    // Expand parent if match found
    if (match) {
      let parent = li.parentElement?.closest('li');
      while (parent) {
        const ul = parent.querySelector('ul');
        if (ul) ul.style.display = '';
        const tog = parent.querySelector('.toggle');
        if (tog) tog.classList.add('expanded');
        parent = parent.parentElement?.closest('li');
      }
    }
  });
}

// ═══ Init ═══
renderTree(treeData, document.getElementById('tree-root'));

// ═══ Keyboard ═══
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') hideDetail();
});
</script>
