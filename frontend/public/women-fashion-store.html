<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MUSE · 女装精品</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f; --bg2: #12121e; --card: #1a1a2e; --card-hover: #222240;
    --surface: #16162a; --border: #2a2a45; --text: #e8e8f0; --text2: #9898b0;
    --text3: #686880; --primary: #c084fc; --primary-dim: #7c3aed;
    --primary-glow: rgba(192,132,252,0.15); --accent: #f472b6;
    --success: #34d399; --danger: #f87171; --warning: #fbbf24;
    --radius: 12px; --radius-sm: 8px; --shadow: 0 4px 24px rgba(0,0,0,0.4);
    --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
  }
  html { scroll-behavior: smooth; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6;
  }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ===== Header ===== */
  .header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,10,15,0.85); backdrop-filter: blur(20px) saturate(1.4);
    -webkit-backdrop-filter: blur(20px) saturate(1.4);
    border-bottom: 1px solid var(--border); padding: 0 24px;
  }
  .header-inner {
    max-width: 1280px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between; height: 64px;
  }
  .logo {
    font-size: 22px; font-weight: 700;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; letter-spacing: 1px; cursor: pointer;
  }
  .logo span { font-weight: 300; -webkit-text-fill-color: var(--text3); }
  .header-actions { display: flex; align-items: center; gap: 12px; }
  .mode-toggle {
    padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text2); font-size: 13px;
    cursor: pointer; transition: var(--transition); white-space: nowrap;
  }
  .mode-toggle:hover { border-color: var(--primary); color: var(--text); }
  .mode-toggle.admin { background: var(--primary); color: #000; border-color: var(--primary); font-weight: 600; }
  .cart-btn {
    position: relative; background: var(--surface); border: 1px solid var(--border);
    color: var(--text); width: 42px; height: 42px; border-radius: 50%;
    cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center;
    transition: var(--transition);
  }
  .cart-btn:hover { border-color: var(--primary); background: var(--card); }
  .cart-badge {
    position: absolute; top: -4px; right: -4px;
    background: var(--danger); color: #fff; font-size: 11px; font-weight: 700;
    min-width: 18px; height: 18px; border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    padding: 0 4px; transform: scale(0); transition: var(--transition);
  }
  .cart-badge.show { transform: scale(1); }
  .wishlist-btn {
    position: relative; background: var(--surface); border: 1px solid var(--border);
    color: var(--text); width: 42px; height: 42px; border-radius: 50%;
    cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center;
    transition: var(--transition);
  }
  .wishlist-btn:hover { border-color: var(--accent); background: var(--card); }
  .wishlist-badge {
    position: absolute; top: -4px; right: -4px;
    background: var(--accent); color: #fff; font-size: 11px; font-weight: 700;
    min-width: 18px; height: 18px; border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    padding: 0 4px; transform: scale(0); transition: var(--transition);
  }
  .wishlist-badge.show { transform: scale(1); }

  /* ===== Toolbar (search + sort) ===== */
  .toolbar {
    max-width: 1280px; margin: 0 auto; padding: 16px 24px 0;
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
  }
  .search-box {
    flex: 1; min-width: 200px; position: relative;
  }
  .search-box input {
    width: 100%; padding: 10px 14px 10px 38px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text);
    font-size: 14px; transition: var(--transition); font-family: inherit;
  }
  .search-box input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-glow); }
  .search-box .icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 16px; color: var(--text3); }
  .sort-select {
    padding: 10px 14px; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text); font-size: 14px;
    cursor: pointer; transition: var(--transition); font-family: inherit;
  }
  .sort-select:focus { outline: none; border-color: var(--primary); }

  /* ===== Categories ===== */
  .categories-wrap {
    max-width: 1280px; margin: 0 auto; padding: 12px 24px 0;
    overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch;
  }
  .categories-wrap::-webkit-scrollbar { display: none; }
  .categories { display: inline-flex; gap: 8px; padding-bottom: 12px; }
  .cat-btn {
    padding: 8px 20px; border-radius: 20px; border: 1px solid var(--border);
    background: transparent; color: var(--text2); font-size: 14px;
    cursor: pointer; transition: var(--transition); white-space: nowrap;
  }
  .cat-btn:hover { border-color: var(--primary); color: var(--text); }
  .cat-btn.active { background: var(--primary); color: #000; border-color: var(--primary); font-weight: 600; }

  /* ===== Products Grid ===== */
  .container { max-width: 1280px; margin: 0 auto; padding: 16px 24px 100px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
  .product-card {
    background: var(--card); border-radius: var(--radius); overflow: hidden;
    cursor: pointer; transition: var(--transition); border: 1px solid transparent;
    position: relative;
  }
  .product-card:hover { border-color: var(--border); background: var(--card-hover); transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,0.5); }
  .product-card.offline { opacity: 0.5; }
  .product-card.offline::after {
    content: '已下架'; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    background: rgba(0,0,0,0.7); color: var(--danger); font-size: 18px; font-weight: 700;
    padding: 8px 20px; border-radius: var(--radius-sm); z-index: 5;
  }
  .product-img-wrap { width: 100%; aspect-ratio: 3/4; overflow: hidden; background: var(--bg2); position: relative; }
  .product-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
  .product-card:hover .product-img { transform: scale(1.05); }
  .product-card.offline:hover .product-img { transform: none; }
  .product-tag {
    position: absolute; top: 12px; left: 12px; background: var(--primary);
    color: #000; font-size: 11px; font-weight: 700; padding: 3px 10px;
    border-radius: 4px; letter-spacing: 0.5px;
  }
  .wishlist-heart {
    position: absolute; top: 12px; right: 12px; width: 32px; height: 32px;
    border-radius: 50%; background: rgba(0,0,0,0.5); border: none;
    color: #fff; font-size: 16px; cursor: pointer; display: flex;
    align-items: center; justify-content: center; transition: var(--transition);
    z-index: 2;
  }
  .wishlist-heart:hover { transform: scale(1.2); }
  .wishlist-heart.liked { color: var(--danger); background: rgba(248,113,113,0.2); }
  .product-body { padding: 16px; }
  .product-category { font-size: 12px; color: var(--primary); font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; }
  .product-name { font-size: 16px; font-weight: 600; margin: 4px 0 6px; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
  .product-desc { font-size: 13px; color: var(--text3); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 12px; line-height: 1.5; }
  .product-footer { display: flex; align-items: center; justify-content: space-between; }
  .product-price { font-size: 18px; font-weight: 700; color: var(--primary); }
  .product-price small { font-size: 13px; font-weight: 400; color: var(--text3); }
  .add-cart-btn {
    padding: 6px 14px; border-radius: var(--radius-sm); border: none;
    background: var(--primary); color: #000; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: var(--transition);
  }
  .add-cart-btn:hover { background: var(--accent); transform: scale(1.05); }
  .add-cart-btn:active { transform: scale(0.95); }
  .add-cart-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* ===== Modal / Detail ===== */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.3s; padding: 20px;
  }
  .modal-overlay.open { opacity: 1; pointer-events: auto; }
  .modal {
    background: var(--bg2); border-radius: 16px; max-width: 800px; width: 100%;
    max-height: 90vh; overflow-y: auto; position: relative;
    box-shadow: 0 24px 80px rgba(0,0,0,0.6); border: 1px solid var(--border);
    transform: scale(0.95) translateY(20px);
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  .modal-overlay.open .modal { transform: scale(1) translateY(0); }
  .modal-close {
    position: absolute; top: 12px; right: 12px; z-index: 10;
    width: 36px; height: 36px; border-radius: 50%;
    border: none; background: rgba(0,0,0,0.5); color: #fff;
    font-size: 20px; cursor: pointer; display: flex;
    align-items: center; justify-content: center; transition: var(--transition);
  }
  .modal-close:hover { background: var(--danger); }
  .modal-grid { display: grid; grid-template-columns: 1fr 1fr; }
  .modal-img-wrap { aspect-ratio: 3/4; overflow: hidden; background: var(--bg); border-radius: 16px 0 0 16px; }
  .modal-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
  .modal-info { padding: 28px; }
  .modal-category { font-size: 12px; color: var(--primary); font-weight: 500; letter-spacing: 1px; text-transform: uppercase; }
  .modal-title { font-size: 24px; font-weight: 700; margin: 4px 0 8px; }
  .modal-price { font-size: 28px; font-weight: 700; color: var(--primary); margin-bottom: 12px; }
  .modal-desc { font-size: 14px; color: var(--text2); line-height: 1.7; margin-bottom: 20px; }
  .modal-section { margin-bottom: 16px; }
  .modal-label { font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 8px; display: block; }
  .color-options { display: flex; gap: 8px; flex-wrap: wrap; }
  .color-dot { width: 32px; height: 32px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; transition: var(--transition); position: relative; }
  .color-dot:hover { transform: scale(1.15); }
  .color-dot.selected { border-color: #fff; box-shadow: 0 0 0 2px var(--primary); }
  .size-options { display: flex; gap: 6px; flex-wrap: wrap; }
  .size-btn { padding: 6px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: transparent; color: var(--text); font-size: 13px; cursor: pointer; transition: var(--transition); }
  .size-btn:hover { border-color: var(--primary); }
  .size-btn.selected { background: var(--primary); color: #000; border-color: var(--primary); font-weight: 600; }
  .modal-stock { font-size: 13px; color: var(--text3); margin-bottom: 20px; }
  .modal-stock .low { color: var(--danger); }
  .modal-stock .ok { color: var(--success); }
  .modal-add-btn { width: 100%; padding: 14px; border-radius: var(--radius-sm); border: none; background: var(--primary); color: #000; font-size: 16px; font-weight: 700; cursor: pointer; transition: var(--transition); }
  .modal-add-btn:hover { background: var(--accent); }
  .modal-add-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ===== Cart Drawer ===== */
  .cart-overlay {
    position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,0.5);
    opacity: 0; pointer-events: none; transition: opacity 0.3s;
  }
  .cart-overlay.open { opacity: 1; pointer-events: auto; }
  .cart-drawer {
    position: fixed; top: 0; right: 0; bottom: 0; z-index: 301;
    width: 420px; max-width: 90vw; background: var(--bg2);
    border-left: 1px solid var(--border); display: flex; flex-direction: column;
    transform: translateX(100%); transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
    box-shadow: -8px 0 40px rgba(0,0,0,0.4);
  }
  .cart-overlay.open .cart-drawer { transform: translateX(0); }
  .cart-header { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px; border-bottom: 1px solid var(--border); }
  .cart-header h2 { font-size: 18px; }
  .cart-header h2 small { font-size: 14px; color: var(--text3); font-weight: 400; }
  .cart-close { width: 32px; height: 32px; border-radius: 50%; border: none; background: var(--surface); color: var(--text); font-size: 18px; cursor: pointer; transition: var(--transition); }
  .cart-close:hover { background: var(--card); }
  .cart-body { flex: 1; overflow-y: auto; padding: 16px 24px; }
  .cart-empty { text-align: center; padding: 60px 0; color: var(--text3); }
  .cart-empty .icon { font-size: 48px; margin-bottom: 12px; }
  .cart-item { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .cart-item-img { width: 64px; height: 80px; border-radius: var(--radius-sm); object-fit: cover; flex-shrink: 0; background: var(--bg); }
  .cart-item-info { flex: 1; min-width: 0; }
  .cart-item-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cart-item-spec { font-size: 12px; color: var(--text3); margin: 2px 0 4px; }
  .cart-item-price { font-size: 15px; font-weight: 700; color: var(--primary); }
  .cart-item-actions { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
  .cart-qty-btn { width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--border); background: transparent; color: var(--text); font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: var(--transition); }
  .cart-qty-btn:hover { border-color: var(--primary); background: var(--card); }
  .cart-qty-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .cart-qty { font-size: 14px; font-weight: 600; min-width: 20px; text-align: center; }
  .cart-item-remove { background: none; border: none; color: var(--text3); font-size: 16px; cursor: pointer; margin-left: auto; padding: 4px; transition: var(--transition); }
  .cart-item-remove:hover { color: var(--danger); }
  .cart-footer { padding: 16px 24px 24px; border-top: 1px solid var(--border); }
  .cart-total { display: flex; justify-content: space-between; font-size: 18px; font-weight: 700; margin-bottom: 12px; }
  .cart-total .amount { color: var(--primary); }
  .cart-checkout-btn { width: 100%; padding: 14px; border-radius: var(--radius-sm); border: none; background: var(--primary); color: #000; font-size: 16px; font-weight: 700; cursor: pointer; transition: var(--transition); }
  .cart-checkout-btn:hover { background: var(--accent); }
  .cart-checkout-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ===== Checkout Form ===== */
  .checkout-form { margin-top: 16px; }
  .form-group { margin-bottom: 12px; }
  .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 4px; }
  .form-group input, .form-group textarea { width: 100%; padding: 10px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-size: 14px; transition: var(--transition); font-family: inherit; }
  .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-glow); }
  .form-group textarea { resize: vertical; min-height: 60px; }
  .form-group .error-text { font-size: 12px; color: var(--danger); margin-top: 2px; display: none; }
  .form-group.invalid input, .form-group.invalid textarea { border-color: var(--danger); }
  .form-group.invalid .error-text { display: block; }
  .submit-btn { width: 100%; padding: 14px; border-radius: var(--radius-sm); border: none; background: var(--success); color: #000; font-size: 16px; font-weight: 700; cursor: pointer; transition: var(--transition); }
  .submit-btn:hover { filter: brightness(1.15); }
  .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ===== Admin Panel ===== */
  .admin-panel { display: none; max-width: 1280px; margin: 0 auto; padding: 20px 24px 100px; }
  .admin-panel.active { display: block; }
  .admin-tabs { display: flex; gap: 4px; margin-bottom: 20px; background: var(--surface); border-radius: var(--radius); padding: 4px; overflow-x: auto; }
  .admin-tab {
    padding: 10px 20px; border-radius: var(--radius-sm); border: none;
    background: transparent; color: var(--text2); font-size: 14px; font-weight: 500;
    cursor: pointer; transition: var(--transition); white-space: nowrap;
  }
  .admin-tab:hover { color: var(--text); background: var(--card); }
  .admin-tab.active { background: var(--primary); color: #000; font-weight: 600; }
  .admin-section { display: none; }
  .admin-section.active { display: block; }
  .admin-table-wrap { overflow-x: auto; }
  .admin-table { width: 100%; border-collapse: collapse; font-size: 14px; }
  .admin-table th {
    background: var(--surface); color: var(--text2); font-weight: 600;
    padding: 12px 14px; text-align: left; border-bottom: 1px solid var(--border);
    white-space: nowrap; position: sticky; top: 0;
  }
  .admin-table td { padding: 12px 14px; border-bottom: 1px solid var(--border); color: var(--text); }
  .admin-table tr:hover td { background: var(--card); }
  .admin-table .thumb { width: 48px; height: 64px; border-radius: 4px; object-fit: cover; }
  .admin-btn {
    padding: 5px 12px; border-radius: var(--radius-sm); border: none;
    font-size: 12px; font-weight: 600; cursor: pointer; transition: var(--transition);
    margin: 0 2px;
  }
  .admin-btn:hover { filter: brightness(1.15); }
  .admin-btn.primary { background: var(--primary); color: #000; }
  .admin-btn.success { background: var(--success); color: #000; }
  .admin-btn.danger { background: var(--danger); color: #fff; }
  .admin-btn.warning { background: var(--warning); color: #000; }
  .admin-btn.outline { background: transparent; border: 1px solid var(--border); color: var(--text2); }
  .admin-badge {
    display: inline-block; padding: 2px 8px; border-radius: 10px;
    font-size: 11px; font-weight: 600;
  }
  .admin-badge.online { background: rgba(52,211,153,0.2); color: var(--success); }
  .admin-badge.offline { background: rgba(248,113,113,0.2); color: var(--danger); }
  .admin-badge.pending { background: rgba(251,191,36,0.2); color: var(--warning); }
  .admin-badge.shipped { background: rgba(192,132,252,0.2); color: var(--primary); }
  .admin-badge.done { background: rgba(52,211,153,0.2); color: var(--success); }
  .admin-stock-input {
    width: 70px; padding: 4px 8px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 4px; color: var(--text);
    font-size: 13px; text-align: center;
  }
  .admin-stock-input:focus { outline: none; border-color: var(--primary); }

  /* ===== Admin Modal (add/edit product) ===== */
  .admin-modal-overlay {
    position: fixed; inset: 0; z-index: 250;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.3s; padding: 20px;
  }
  .admin-modal-overlay.open { opacity: 1; pointer-events: auto; }
  .admin-modal {
    background: var(--bg2); border-radius: 16px; max-width: 600px; width: 100%;
    max-height: 90vh; overflow-y: auto; border: 1px solid var(--border);
    padding: 32px; transform: scale(0.95); transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow: 0 24px 80px rgba(0,0,0,0.6);
  }
  .admin-modal-overlay.open .admin-modal { transform: scale(1); }
  .admin-modal h2 { font-size: 20px; margin-bottom: 20px; }
  .admin-modal .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .admin-modal .form-group { margin-bottom: 14px; }
  .admin-modal .form-group label { font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 4px; display: block; }
  .admin-modal .form-group input, .admin-modal .form-group select, .admin-modal .form-group textarea {
    width: 100%; padding: 10px 14px; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text); font-size: 14px; font-family: inherit;
    transition: var(--transition);
  }
  .admin-modal .form-group input:focus, .admin-modal .form-group select:focus, .admin-modal .form-group textarea:focus {
    outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-glow);
  }
  .admin-modal .form-group textarea { min-height: 60px; resize: vertical; }
  .admin-modal-actions { display: flex; gap: 12px; margin-top: 20px; }
  .admin-modal-actions button { flex: 1; padding: 12px; border-radius: var(--radius-sm); font-size: 15px; font-weight: 600; cursor: pointer; border: none; transition: var(--transition); }
  .admin-modal-actions .btn-primary { background: var(--primary); color: #000; }
  .admin-modal-actions .btn-primary:hover { background: var(--accent); }
  .admin-modal-actions .btn-cancel { background: var(--surface); color: var(--text2); border: 1px solid var(--border); }
  .admin-modal-actions .btn-cancel:hover { background: var(--card); }

  /* ===== Wishlist Drawer ===== */
  .wishlist-overlay {
    position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,0.5);
    opacity: 0; pointer-events: none; transition: opacity 0.3s;
  }
  .wishlist-overlay.open { opacity: 1; pointer-events: auto; }
  .wishlist-drawer {

  .wishlist-close { width: 32px; height: 32px; border-radius: 50%; border: none; background: var(--surface); color: var(--text); font-size: 18px; cursor: pointer; transition: var(--transition); }

  .wishlist-body { flex: 1; overflow-y: auto; padding: 16px 24px; }
  .wishlist-empty { text-align: center; padding: 60px 0; color: var(--text3); }

  .wishlist-item-name { font-size: 14px; font-weight: 600; }
  .wishlist-item-price { font-size: 15px; font-weight: 700; color: var(--primary); margin-top: 2px; }
  .wishlist-item-remove { background: none; border: none; color: var(--text3); font-size: 18px; cursor: pointer; padding: 4px; transition: var(--transition); }
  .wishlist-item-remove:hover { color: var(--danger); }

  /* ===== Toast & Success ===== */
  .toast-container { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 500; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
  .toast { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 12px 24px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; box-shadow: var(--shadow); animation: toastIn 0.3s ease, toastOut 0.3s 2.5s ease forwards; pointer-events: auto; }
  @keyframes toastIn { from { opacity:0; transform:translateY(20px) scale(0.95); } to { opacity:1; transform:translateY(0) scale(1); } }
  @keyframes toastOut { from { opacity:1; } to { opacity:0; transform:translateY(-10px); } }
  .success-modal {
    position: fixed; inset: 0; z-index: 400; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);

    opacity: 0; pointer-events: none; transition: opacity 0.3s; padding: 20px;
  }
  .success-modal.open { opacity: 1; pointer-events: auto; }
  .success-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 48px 40px; text-align: center; max-width: 400px; width: 100%; transform: scale(0.9); transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); }
  .success-modal.open .success-box { transform: scale(1); }
  .success-box .icon { font-size: 56px; margin-bottom: 16px; }

  .success-box button { padding: 10px 32px; border-radius: var(--radius-sm); border: none; background: var(--primary); color: #000; font-size: 14px; font-weight: 600; cursor: pointer; transition: var(--transition); }
  .success-box button:hover { background: var(--accent); }

  /* ===== Responsive ===== */
  @media (max-width: 768px) {
    .header { padding: 0 16px; }
    .header-inner { height: 56px; }

    .categories-wrap { padding: 8px 16px 0; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }

    .modal-img-wrap { aspect-ratio: 4/3; border-radius: 16px 16px 0 0; }

    .modal-price { font-size: 22px; }
    .cart-drawer { width: 100%; max-width: 100vw; }
    .wishlist-drawer { width: 100%; max-width: 100vw; }
    .product-body { padding: 12px; }
    .product-name { font-size: 14px; }
    .product-price { font-size: 16px; }
    .add-cart-btn { padding: 5px 10px; font-size: 12px; }

    .admin-table { font-size: 13px; }

  }
  @media (max-width: 480px) {

  }
</style>

<body>

<!-- Header -->
<header class="header">
  <div class="header-inner">
    <div class="logo" onclick="switchMode('front')">MUSE<span> · 女装</span></div>
    <div class="header-actions">
      <button class="mode-toggle" id="modeToggle" onclick="toggleAdminMode()">⚙️ 后台管理</button>
      <button class="wishlist-btn" onclick="toggleWishlist()" aria-label="心愿单">
        ♥<span class="wishlist-badge" id="wishlistBadge">0</span>
      </button>
      <button class="cart-btn" onclick="toggleCart()" aria-label="购物车">
        🛍️<span class="cart-badge" id="cartBadge">0</span>
      </button>
    </div>
  </div>
</header>

<!-- ===== FRONTEND ===== -->
<div id="frontendArea">
  <!-- Toolbar -->
  <div class="toolbar">
    <div class="search-box">
      <span class="icon">🔍</span>
      <input type="text" id="searchInput" placeholder="搜索商品名称或描述..." oninput="filterAndRender()">
    </div>
    <select class="sort-select" id="sortSelect" onchange="filterAndRender()">
      <option value="default">默认排序</option>
      <option value="price-asc">价格 ↑ 低到高</option>
      <option value="price-desc">价格 ↓ 高到低</option>
      <option value="name">名称 A-Z</option>
    </select>
  </div>

  <!-- Categories -->
  <div class="categories-wrap">
    <div class="categories" id="categories"></div>
  </div>

  <!-- Products -->
  <div class="container">
    <div class="grid" id="productGrid"></div>
  </div>
</div>

<!-- ===== ADMIN PANEL ===== -->
<div class="admin-panel" id="adminPanel">
  <div class="admin-tabs">
    <button class="admin-tab active" data-tab="products" onclick="switchAdminTab('products')">📦 商品管理</button>
    <button class="admin-tab" data-tab="orders" onclick="switchAdminTab('orders')">📋 订单管理</button>
  </div>

  <!-- Products Management -->
  <div class="admin-section active" id="adminProducts">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px;">
      <h2 style="font-size:18px;">商品列表 <small style="color:var(--text3);font-weight:400;font-size:14px;" id="adminProductCount">(0)</small></h2>
      <button class="admin-btn primary" onclick="openAddProductModal()">＋ 上架新商品</button>
    </div>
    <div class="admin-table-wrap">
      <table class="admin-table">
        <thead><tr>
          <th>图片</th><th>名称</th><th>分类</th><th>价格</th><th>颜色</th><th>尺码</th><th>库存</th><th>状态</th><th>操作</th>
        </tr></thead>
        <tbody id="adminProductTableBody"></tbody>
      </table>
    </div>
  </div>

  <!-- Orders Management -->
  <div class="admin-section" id="adminOrders">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px;">
      <h2 style="font-size:18px;">订单管理 <small style="color:var(--text3);font-weight:400;font-size:14px;" id="adminOrderCount">(0)</small></h2>
      <div style="display:flex;gap:6px;flex-wrap:wrap;">
        <button class="admin-btn outline" data-filter="all" onclick="filterOrders('all')">全部</button>
        <button class="admin-btn outline" data-filter="pending" onclick="filterOrders('pending')">待付款</button>
        <button class="admin-btn outline" data-filter="shipped" onclick="filterOrders('shipped')">已发货</button>
        <button class="admin-btn outline" data-filter="done" onclick="filterOrders('done')">已完成</button>
      </div>
    </div>
    <div class="admin-table-wrap">
      <table class="admin-table">
        <thead><tr>
          <th>订单号</th><th>商品</th><th>金额</th><th>收货地址</th><th>电话</th><th>备注</th><th>时间</th><th>状态</th><th>操作</th>
        </tr></thead>
        <tbody id="adminOrderTableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>

      <div class="modal-img-wrap"><img id="modalImg" src="" alt=""></div>

        <div class="modal-category" id="modalCategory"></div>
        <div class="modal-title" id="modalTitle"></div>
        <div class="modal-price" id="modalPrice"></div>
        <div class="modal-desc" id="modalDesc"></div>
        <div class="modal-section">
          <span class="modal-label">颜色</span>
          <div class="color-options" id="modalColors"></div>
        </div>
        <div class="modal-section">
          <span class="modal-label">尺码</span>
          <div class="size-options" id="modalSizes"></div>
        </div>
        <div class="modal-stock" id="modalStock"></div>
        <button class="modal-add-btn" id="modalAddBtn" onclick="addFromModal()">加入购物车</button>
      </div>
    </div>
  </div>
</div>

<!-- Admin Product Modal (Add/Edit) -->

</div>

// ===== Data Persistence =====
function loadProducts() {
  try { const d = JSON.parse(localStorage.getItem('muse_products')); if (d && d.length) return d; } catch {}

}
function saveProducts() { localStorage.setItem('muse_products', JSON.stringify(PRODUCTS)); }

}

// ===== Mode Switch =====
function toggleAdminMode() {
  isAdminMode = !isAdminMode;
  const btn = document.getElementById('modeToggle');
  const front = document.getElementById('frontendArea');
  const admin = document.getElementById('adminPanel');
  if (isAdminMode) {
    btn.textContent = '👗 前台展示';
    btn.classList.add('admin');
    front.style.display = 'none';
    admin.classList.add('active');
    renderAdminProducts();
    renderAdminOrders();
  } else {
    btn.textContent = '⚙️ 后台管理';
    btn.classList.remove('admin');
    front.style.display = 'block';
    admin.classList.remove('active');
  }
}
function switchMode(mode) {
  if (mode === 'front' && isAdminMode) toggleAdminMode();
}

// ===== Admin Tabs =====
function switchAdminTab(tab) {
  document.querySelectorAll('.admin-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.admin-section').forEach(s => s.classList.toggle('active', s.id === 'admin' + tab.charAt(0).toUpperCase() + tab.slice(1)));
  if (tab === 'products') renderAdminProducts();
  if (tab === 'orders') renderAdminOrders();
}

// ===== Admin Products =====
function renderAdminProducts() {
  const tbody = document.getElementById('adminProductTableBody');
  document.getElementById('adminProductCount').textContent = `(${PRODUCTS.length})`;
  tbody.innerHTML = PRODUCTS.map(p => {
    const colorsHtml = p.colors.map(c => `<span style="display:inline-block;width:14px;height:14px;border-radius:50%;background:${c};border:1px solid rgba(255,255,255,0.2);vertical-align:middle;"></span>`).join(' ');
    return `<tr>
      <td><img class="thumb" src="${p.img}" alt="${p.name}" loading="lazy"></td>
      <td><strong>${p.name}</strong></td>
      <td>${CATEGORY_LABELS[p.category] || p.category}</td>
      <td>¥${p.price}</td>
      <td style="font-size:12px;">${colorsHtml}</td>
      <td>${p.sizes.join(', ')}</td>
      <td><input class="admin-stock-input" type="number" value="${p.stock}" min="0" onchange="updateStock(${p.id}, this.value)"></td>
      <td><span class="admin-badge ${p.online ? 'online' : 'offline'}">${p.online ? '在售' : '已下架'}</span></td>
      <td>
        <button class="admin-btn primary" onclick="openEditProductModal(${p.id})">编辑</button>
        <button class="admin-btn ${p.online ? 'danger' : 'success'}" onclick="toggleOnline(${p.id})">${p.online ? '下架' : '上架'}</button>
      </td>
    </tr>`;
  }).join('');
}

function updateStock(id, val) {
  const p = PRODUCTS.find(x => x.id === id);
  if (!p) return;
  p.stock = Math.max(0, parseInt(val) || 0);
  saveProducts();
  renderAdminProducts();
  renderProducts();
  showToast('库存已更新 ✅');
}

function toggleOnline(id) {
  const p = PRODUCTS.find(x => x.id === id);
  if (!p) return;
  p.online = !p.online;
  saveProducts();
  renderAdminProducts();
  renderProducts();
  showToast(p.online ? '已上架 ✅' : '已下架 ⏸️');
}

// ===== Admin Product Modal =====
function openAddProductModal() {
  editingProductId = null;
  document.getElementById('adminProductModalTitle').textContent = '上架新商品';
  document.getElementById('apSaveBtn').textContent = '上架';
  document.getElementById('apName').value = '';
  document.getElementById('apCategory').value = 'dress';
  document.getElementById('apPrice').value = '';
  document.getElementById('apStock').value = '';
  document.getElementById('apDesc').value = '';
  document.getElementById('apImg').value = '';
  document.getElementById('apColors').value = '';
  document.getElementById('apSizes').value = '';
  document.getElementById('adminProductModal').classList.add('open');
}

function openEditProductModal(id) {
  const p = PRODUCTS.find(x => x.id === id);
  if (!p) return;
  editingProductId = id;
  document.getElementById('adminProductModalTitle').textContent = '编辑商品';
  document.getElementById('apSaveBtn').textContent = '保存修改';
  document.getElementById('apName').value = p.name;
  document.getElementById('apCategory').value = p.category;
  document.getElementById('apPrice').value = p.price;
  document.getElementById('apStock').value = p.stock;
  document.getElementById('apDesc').value = p.desc;
  document.getElementById('apImg').value = p.img;
  document.getElementById('apColors').value = p.colors.join(',');
  document.getElementById('apSizes').value = p.sizes.join(',');
  document.getElementById('adminProductModal').classList.add('open');
}

function closeAdminProductModal() {
  document.getElementById('adminProductModal').classList.remove('open');
}

function saveAdminProduct() {
  const name = document.getElementById('apName').value.trim();
  const category = document.getElementById('apCategory').value;
  const price = parseInt(document.getElementById('apPrice').value);
  const stock = parseInt(document.getElementById('apStock').value);
  const desc = document.getElementById('apDesc').value.trim();
  const img = document.getElementById('apImg').value.trim();
  const colorsStr = document.getElementById('apColors').value.trim();
  const sizesStr = document.getElementById('apSizes').value.trim();

  if (!name || !desc || !img || !colorsStr || !sizesStr || !price || !stock) {
    showToast('请填写所有必填字段 ✏️'); return;
  }
  const colors = colorsStr.split(',').map(s => s.trim()).filter(Boolean);
  const sizes = sizesStr.split(',').map(s => s.trim()).filter(Boolean);
  if (colors.length === 0 || sizes.length === 0) { showToast('颜色和尺码至少各填一个 ✏️'); return; }

  if (editingProductId) {
    const p = PRODUCTS.find(x => x.id === editingProductId);
    if (p) {
      Object.assign(p, { name, category, price, stock, desc, img, colors, sizes });
      saveProducts();
      renderAdminProducts();
      renderProducts();
      closeAdminProductModal();
      showToast('商品已更新 ✅');
    }
  } else {
    const maxId = Math.max(...PRODUCTS.map(p => p.id), 0);
    PRODUCTS.push({ id: maxId + 1, name, category, price, stock, desc, img, colors, sizes, online: true });
    saveProducts();
    renderAdminProducts();
    renderProducts();
    closeAdminProductModal();
    showToast('商品已上架 ✅');
  }
}
