<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MUSE · 女装精品</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f;
    --bg2: #12121e;
    --card: #1a1a2e;
    --card-hover: #222240;
    --surface: #16162a;
    --border: #2a2a45;
    --text: #e8e8f0;
    --text2: #9898b0;
    --text3: #686880;
    --primary: #c084fc;
    --primary-dim: #7c3aed;
    --primary-glow: rgba(192,132,252,0.15);
    --accent: #f472b6;
    --success: #34d399;
    --danger: #f87171;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
    --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
  }
  html { scroll-behavior: smooth; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text3); }

  /* ===== Header ===== */
  .header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(20px) saturate(1.4);
    -webkit-backdrop-filter: blur(20px) saturate(1.4);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
  }
  .header-inner {
    max-width: 1280px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    height: 64px;
  }
  .logo {
    font-size: 22px; font-weight: 700;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 1px;
  }
  .logo span { font-weight: 300; -webkit-text-fill-color: var(--text3); }
  .header-actions { display: flex; align-items: center; gap: 16px; }
  .cart-btn {
    position: relative;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); width: 42px; height: 42px; border-radius: 50%;
    cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center;
    transition: var(--transition);
  }
  .cart-btn:hover { border-color: var(--primary); background: var(--card); }
  .cart-badge {
    position: absolute; top: -4px; right: -4px;
    background: var(--danger); color: #fff;
    font-size: 11px; font-weight: 700; min-width: 18px; height: 18px;
    border-radius: 9px; display: flex; align-items: center; justify-content: center;
    padding: 0 4px; transform: scale(0); transition: var(--transition);
  }
  .cart-badge.show { transform: scale(1); }

  /* ===== Categories ===== */
  .categories-wrap {
    max-width: 1280px; margin: 0 auto; padding: 20px 24px 0;
    overflow-x: auto; white-space: nowrap;
    -webkit-overflow-scrolling: touch;
  }
  .categories-wrap::-webkit-scrollbar { display: none; }
  .categories {
    display: inline-flex; gap: 8px; padding-bottom: 16px;
  }
  .cat-btn {
    padding: 8px 20px; border-radius: 20px;
    border: 1px solid var(--border); background: transparent;
    color: var(--text2); font-size: 14px; cursor: pointer;
    transition: var(--transition); white-space: nowrap;
  }
  .cat-btn:hover { border-color: var(--primary); color: var(--text); }
  .cat-btn.active {
    background: var(--primary); color: #000; border-color: var(--primary);
    font-weight: 600;
  }

  /* ===== Products Grid ===== */
  .container {
    max-width: 1280px; margin: 0 auto; padding: 20px 24px 100px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
  }
  .product-card {
    background: var(--card); border-radius: var(--radius);
    overflow: hidden; cursor: pointer;
    transition: var(--transition); border: 1px solid transparent;
    position: relative;
  }
  .product-card:hover {
    border-color: var(--border);
    background: var(--card-hover);
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
  }
  .product-img-wrap {
    width: 100%; aspect-ratio: 3/4; overflow: hidden;
    background: var(--bg2); position: relative;
  }
  .product-img {
    width: 100%; height: 100%; object-fit: cover;
    transition: transform 0.5s ease;
  }
  .product-card:hover .product-img { transform: scale(1.05); }
  .product-tag {
    position: absolute; top: 12px; left: 12px;
    background: var(--primary); color: #000;
    font-size: 11px; font-weight: 700; padding: 3px 10px;
    border-radius: 4px; letter-spacing: 0.5px;
  }
  .product-body { padding: 16px; }
  .product-category {
    font-size: 12px; color: var(--primary); font-weight: 500;
    letter-spacing: 0.5px; text-transform: uppercase;
  }
  .product-name {
    font-size: 16px; font-weight: 600; margin: 4px 0 6px;
    display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .product-desc {
    font-size: 13px; color: var(--text3);
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden; margin-bottom: 12px; line-height: 1.5;
  }
  .product-footer {
    display: flex; align-items: center; justify-content: space-between;
  }
  .product-price {
    font-size: 18px; font-weight: 700; color: var(--primary);
  }
  .product-price small { font-size: 13px; font-weight: 400; color: var(--text3); }
  .add-cart-btn {
    padding: 6px 14px; border-radius: var(--radius-sm);
    border: none; background: var(--primary); color: #000;
    font-size: 13px; font-weight: 600; cursor: pointer;
    transition: var(--transition);
  }
  .add-cart-btn:hover { background: var(--accent); transform: scale(1.05); }
  .add-cart-btn:active { transform: scale(0.95); }

  /* ===== Modal / Detail ===== */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.3s;
    padding: 20px;
  }
  .modal-overlay.open { opacity: 1; pointer-events: auto; }
  .modal {
    background: var(--bg2); border-radius: 16px;
    max-width: 800px; width: 100%; max-height: 90vh;
    overflow-y: auto; position: relative;
    box-shadow: 0 24px 80px rgba(0,0,0,0.6);
    border: 1px solid var(--border);
    transform: scale(0.95) translateY(20px);
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  .modal-overlay.open .modal { transform: scale(1) translateY(0); }
  .modal-close {
    position: absolute; top: 12px; right: 12px; z-index: 10;
    width: 36px; height: 36px; border-radius: 50%;
    border: none; background: rgba(0,0,0,0.5); color: #fff;
    font-size: 20px; cursor: pointer; display: flex;
    align-items: center; justify-content: center;
    transition: var(--transition);
  }
  .modal-close:hover { background: var(--danger); }
  .modal-grid { display: grid; grid-template-columns: 1fr 1fr; }
  .modal-img-wrap {
    aspect-ratio: 3/4; overflow: hidden; background: var(--bg);
    border-radius: 16px 0 0 16px;
  }
  .modal-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
  .modal-info { padding: 28px; }
  .modal-category {
    font-size: 12px; color: var(--primary); font-weight: 500;
    letter-spacing: 1px; text-transform: uppercase;
  }
  .modal-title {
    font-size: 24px; font-weight: 700; margin: 4px 0 8px;
  }
  .modal-price {
    font-size: 28px; font-weight: 700; color: var(--primary);
    margin-bottom: 12px;
  }
  .modal-desc {
    font-size: 14px; color: var(--text2); line-height: 1.7;
    margin-bottom: 20px;
  }
  .modal-section { margin-bottom: 16px; }
  .modal-label {
    font-size: 13px; font-weight: 600; color: var(--text2);
    margin-bottom: 8px; display: block;
  }
  .color-options { display: flex; gap: 8px; flex-wrap: wrap; }
  .color-dot {
    width: 32px; height: 32px; border-radius: 50%;
    border: 2px solid transparent; cursor: pointer;
    transition: var(--transition); position: relative;
  }
  .color-dot:hover { transform: scale(1.15); }
  .color-dot.selected { border-color: #fff; box-shadow: 0 0 0 2px var(--primary); }
  .size-options { display: flex; gap: 6px; flex-wrap: wrap; }
  .size-btn {
    padding: 6px 14px; border-radius: var(--radius-sm);
    border: 1px solid var(--border); background: transparent;
    color: var(--text); font-size: 13px; cursor: pointer;
    transition: var(--transition);
  }
  .size-btn:hover { border-color: var(--primary); }
  .size-btn.selected { background: var(--primary); color: #000; border-color: var(--primary); font-weight: 600; }
  .size-btn.disabled { opacity: 0.3; cursor: not-allowed; text-decoration: line-through; }
  .modal-stock {
    font-size: 13px; color: var(--text3); margin-bottom: 20px;
  }
  .modal-stock .low { color: var(--danger); }
  .modal-stock .ok { color: var(--success); }
  .modal-add-btn {
    width: 100%; padding: 14px; border-radius: var(--radius-sm);
    border: none; background: var(--primary); color: #000;
    font-size: 16px; font-weight: 700; cursor: pointer;
    transition: var(--transition);
  }
  .modal-add-btn:hover { background: var(--accent); }

  /* ===== Cart Drawer ===== */
  .cart-overlay {
    position: fixed; inset: 0; z-index: 300;
    background: rgba(0,0,0,0.5);
    opacity: 0; pointer-events: none; transition: opacity 0.3s;
  }
  .cart-overlay.open { opacity: 1; pointer-events: auto; }
  .cart-drawer {
    position: fixed; top: 0; right: 0; bottom: 0; z-index: 301;
    width: 420px; max-width: 90vw;
    background: var(--bg2); border-left: 1px solid var(--border);
    display: flex; flex-direction: column;
    transform: translateX(100%); transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
    box-shadow: -8px 0 40px rgba(0,0,0,0.4);
  }
  .cart-overlay.open .cart-drawer { transform: translateX(0); }
  .cart-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 24px; border-bottom: 1px solid var(--border);
  }
  .cart-header h2 { font-size: 18px; }
  .cart-header h2 small { font-size: 14px; color: var(--text3); font-weight: 400; }
  .cart-close {
    width: 32px; height: 32px; border-radius: 50%;
    border: none; background: var(--surface); color: var(--text);
    font-size: 18px; cursor: pointer; transition: var(--transition);
  }
  .cart-close:hover { background: var(--card); }
  .cart-body {
    flex: 1; overflow-y: auto; padding: 16px 24px;
  }
  .cart-empty {
    text-align: center; padding: 60px 0; color: var(--text3);
  }
  .cart-empty .icon { font-size: 48px; margin-bottom: 12px; }
  .cart-item {
    display: flex; gap: 12px; padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .cart-item-img {
    width: 64px; height: 80px; border-radius: var(--radius-sm);
    object-fit: cover; flex-shrink: 0; background: var(--bg);
  }
  .cart-item-info { flex: 1; min-width: 0; }
  .cart-item-name {
    font-size: 14px; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .cart-item-spec {
    font-size: 12px; color: var(--text3); margin: 2px 0 4px;
  }
  .cart-item-price { font-size: 15px; font-weight: 700; color: var(--primary); }
  .cart-item-actions {
    display: flex; align-items: center; gap: 8px; margin-top: 6px;
  }
  .cart-qty-btn {
    width: 28px; height: 28px; border-radius: 50%;
    border: 1px solid var(--border); background: transparent;
    color: var(--text); font-size: 14px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: var(--transition);
  }
  .cart-qty-btn:hover { border-color: var(--primary); background: var(--card); }
  .cart-qty-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .cart-qty { font-size: 14px; font-weight: 600; min-width: 20px; text-align: center; }
  .cart-item-remove {
    background: none; border: none; color: var(--text3);
    font-size: 16px; cursor: pointer; margin-left: auto;
    padding: 4px; transition: var(--transition);
  }
  .cart-item-remove:hover { color: var(--danger); }
  .cart-footer {
    padding: 16px 24px 24px;
    border-top: 1px solid var(--border);
  }
  .cart-total {
    display: flex; justify-content: space-between;
    font-size: 18px; font-weight: 700; margin-bottom: 12px;
  }
  .cart-total .amount { color: var(--primary); }
  .cart-checkout-btn {
    width: 100%; padding: 14px; border-radius: var(--radius-sm);
    border: none; background: var(--primary); color: #000;
    font-size: 16px; font-weight: 700; cursor: pointer;
    transition: var(--transition);
  }
  .cart-checkout-btn:hover { background: var(--accent); }
  .cart-checkout-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ===== Checkout Form (in cart) ===== */
  .checkout-form { margin-top: 16px; }
  .form-group { margin-bottom: 12px; }
  .form-group label {
    display: block; font-size: 13px; font-weight: 600;
    color: var(--text2); margin-bottom: 4px;
  }
  .form-group input, .form-group textarea {
    width: 100%; padding: 10px 14px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text);
    font-size: 14px; transition: var(--transition);
    font-family: inherit;
  }
  .form-group input:focus, .form-group textarea:focus {
    outline: none; border-color: var(--primary);
    box-shadow: 0 0 0 3px var(--primary-glow);
  }
  .form-group textarea { resize: vertical; min-height: 60px; }
  .form-group .error-text {
    font-size: 12px; color: var(--danger); margin-top: 2px; display: none;
  }
  .form-group.invalid input, .form-group.invalid textarea {
    border-color: var(--danger);
  }
  .form-group.invalid .error-text { display: block; }
  .submit-btn {
    width: 100%; padding: 14px; border-radius: var(--radius-sm);
    border: none; background: var(--success); color: #000;
    font-size: 16px; font-weight: 700; cursor: pointer;
    transition: var(--transition);
  }
  .submit-btn:hover { filter: brightness(1.15); }
  .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ===== Toast ===== */
  .toast-container {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    z-index: 500; display: flex; flex-direction: column; gap: 8px;
    pointer-events: none;
  }
  .toast {
    background: var(--card); border: 1px solid var(--border);
    color: var(--text); padding: 12px 24px; border-radius: var(--radius-sm);
    font-size: 14px; font-weight: 500;
    box-shadow: var(--shadow);
    animation: toastIn 0.3s ease, toastOut 0.3s 2.5s ease forwards;
    pointer-events: auto;
  }
  @keyframes toastIn { from { opacity:0; transform:translateY(20px) scale(0.95); } to { opacity:1; transform:translateY(0) scale(1); } }
  @keyframes toastOut { from { opacity:1; } to { opacity:0; transform:translateY(-10px); } }

  /* ===== Success Modal ===== */
  .success-modal {
    position: fixed; inset: 0; z-index: 400;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.3s;
    padding: 20px;
  }
  .success-modal.open { opacity: 1; pointer-events: auto; }
  .success-box {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 16px; padding: 48px 40px;
    text-align: center; max-width: 400px; width: 100%;
    transform: scale(0.9); transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  .success-modal.open .success-box { transform: scale(1); }
  .success-box .icon { font-size: 56px; margin-bottom: 16px; }
  .success-box h2 { font-size: 22px; margin-bottom: 8px; }
  .success-box p { color: var(--text2); margin-bottom: 24px; }
  .success-box button {
    padding: 10px 32px; border-radius: var(--radius-sm);
    border: none; background: var(--primary); color: #000;
    font-size: 14px; font-weight: 600; cursor: pointer;
    transition: var(--transition);
  }
  .success-box button:hover { background: var(--accent); }

  /* ===== Responsive ===== */
  @media (max-width: 768px) {
    .header { padding: 0 16px; }
    .header-inner { height: 56px; }
    .container { padding: 16px 16px 100px; }
    .categories-wrap { padding: 16px 16px 0; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
    .modal-grid { grid-template-columns: 1fr; }
    .modal-img-wrap { aspect-ratio: 4/3; border-radius: 16px 16px 0 0; }
    .modal-info { padding: 20px; }
    .modal-title { font-size: 20px; }
    .modal-price { font-size: 22px; }
    .cart-drawer { width: 100%; max-width: 100vw; }
    .product-body { padding: 12px; }
    .product-name { font-size: 14px; }
    .product-price { font-size: 16px; }
    .add-cart-btn { padding: 5px 10px; font-size: 12px; }
  }
  @media (max-width: 480px) {
    .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  }
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-inner">
    <div class="logo">MUSE<span> · 女装</span></div>
    <div class="header-actions">
      <button class="cart-btn" onclick="toggleCart()" aria-label="购物车">
        🛍️
        <span class="cart-badge" id="cartBadge">0</span>
      </button>
    </div>
  </div>
</header>

<!-- Categories -->
<div class="categories-wrap">
  <div class="categories" id="categories"></div>
</div>

<!-- Products -->
<div class="container">
  <div class="grid" id="productGrid"></div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-grid">
      <div class="modal-img-wrap">
        <img id="modalImg" src="" alt="">
      </div>
      <div class="modal-info">
        <div class="modal-category" id="modalCategory"></div>
        <div class="modal-title" id="modalTitle"></div>
        <div class="modal-price" id="modalPrice"></div>
        <div class="modal-desc" id="modalDesc"></div>
        <div class="modal-section">
          <span class="modal-label">颜色</span>
          <div class="color-options" id="modalColors"></div>
        </div>
        <div class="modal-section">
          <span class="modal-label">尺码</span>
          <div class="size-options" id="modalSizes"></div>
        </div>
        <div class="modal-stock" id="modalStock"></div>
        <button class="modal-add-btn" onclick="addFromModal()">加入购物车</button>
      </div>
    </div>
  </div>
</div>

<!-- Cart Overlay + Drawer -->
<div class="cart-overlay" id="cartOverlay" onclick="toggleCart()">
  <div class="cart-drawer" onclick="event.stopPropagation()">
    <div class="cart-header">
      <h2>购物车 <small id="cartCountLabel">(0)</small></h2>
      <button class="cart-close" onclick="toggleCart()">✕</button>
    </div>
    <div class="cart-body" id="cartBody">
      <div class="cart-empty" id="cartEmpty">
        <div class="icon">🛒</div>
        <p>购物车还是空的</p>
        <p style="font-size:13px;color:var(--text3);margin-top:4px;">去逛逛吧～</p>
      </div>
      <div id="cartItems"></div>
    </div>
    <div class="cart-footer" id="cartFooter">
      <div class="cart-total">
        <span>合计</span>
        <span class="amount" id="cartTotal">¥0</span>
      </div>
      <button class="cart-checkout-btn" id="checkoutBtn" onclick="showCheckout()">去结算</button>

      <!-- Checkout Form -->
      <div class="checkout-form" id="checkoutForm" style="display:none;">
        <div class="form-group" id="addrGroup">
          <label>收货地址</label>
          <input type="text" id="checkoutAddr" placeholder="省/市/区/详细地址" maxlength="200">
          <div class="error-text">请填写收货地址</div>
        </div>
        <div class="form-group" id="phoneGroup">
          <label>联系电话</label>
          <input type="text" id="checkoutPhone" placeholder="11位手机号" maxlength="11">
          <div class="error-text">请填写正确的手机号</div>
        </div>
        <div class="form-group">
          <label>备注（选填）</label>
          <textarea id="checkoutNote" placeholder="如：请放快递柜" maxlength="200"></textarea>
        </div>
        <button class="submit-btn" onclick="submitOrder()">✅ 提交订单</button>
        <button style="width:100%;padding:10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:transparent;color:var(--text2);font-size:13px;cursor:pointer;margin-top:8px;" onclick="hideCheckout()">返回购物车</button>
      </div>
    </div>
  </div>
</div>

<!-- Success Modal -->
<div class="success-modal" id="successModal">
  <div class="success-box">
    <div class="icon">🎉</div>
    <h2>下单成功！</h2>
    <p id="successMsg">您的订单已提交，我们将尽快发货。</p>
    <button onclick="closeSuccessModal()">继续购物</button>
  </div>
</div>

<!-- Toast -->
<div class="toast-container" id="toastContainer"></div>

<script>
// ===== DATA =====
const CATEGORIES = [
  { id: 'all', label: '全部', icon: '👗' },

// ===== STATE =====
let currentCategory = 'all';
let currentProduct = null;
let selectedColor = null;
let selectedSize = null;
let cart = loadCart();

// ===== Cart Persistence =====
function loadCart() {
  try { return JSON.parse(localStorage.getItem('muse_cart')) || []; } catch { return []; }
}
function saveCart() {
  localStorage.setItem('muse_cart', JSON.stringify(cart));
  updateCartUI();
}
function updateCartUI() {
  const count = cart.reduce((s,i) => s + i.qty, 0);
  const badge = document.getElementById('cartBadge');
  badge.textContent = count;
  badge.classList.toggle('show', count > 0);
  document.getElementById('cartCountLabel').textContent = `(${count})`;
  renderCartItems();
}
function addToCart(productId, color, size, qty = 1) {
  const idx = cart.findIndex(i => i.productId === productId && i.color === color && i.size === size);
  if (idx > -1) {
    cart[idx].qty += qty;
  } else {
    const p = PRODUCTS.find(x => x.id === productId);
    cart.push({ productId, color, size, qty, name: p.name, price: p.price, img: p.img });
  }
  saveCart();
  showToast(`已加入购物车 🛍️`);
}
function removeCartItem(index) {
  cart.splice(index, 1);
  saveCart();
}
function updateCartQty(index, delta) {
  if (cart[index].qty + delta <= 0) { removeCartItem(index); return; }
  cart[index].qty += delta;
  saveCart();
}

// ===== Render Products =====
function renderCategories() {
  const el = document.getElementById('categories');
  el.innerHTML = CATEGORIES.map(c =>
    `<button class="cat-btn${c.id === currentCategory ? ' active' : ''}" onclick="setCategory('${c.id}')">${c.icon} ${c.label}</button>`
  ).join('');
}

function renderProducts() {
  const el = document.getElementById('productGrid');
  const filtered = currentCategory === 'all'
    ? PRODUCTS : PRODUCTS.filter(p => p.category === currentCategory);
  el.innerHTML = filtered.map(p => {
    const colorDots = p.colors.slice(0, 3).map(c =>
      `<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${c};border:1px solid rgba(255,255,255,0.2);margin-right:2px;"></span>`
    ).join('');
    const more = p.colors.length > 3 ? `<span style="font-size:10px;color:var(--text3);">+${p.colors.length-3}</span>` : '';
    return `
    <div class="product-card" onclick="openDetail(${p.id})">
      <div class="product-img-wrap">
        <img class="product-img" src="${p.img}" alt="${p.name}" loading="lazy">
        <span class="product-tag">${CATEGORIES.find(c=>c.id===p.category)?.label||''}</span>
      </div>
      <div class="product-body">
        <div class="product-category">${p.category === 'dress' ? '连衣裙' : p.category === 'top' ? '上衣' : p.category === 'pants' ? '裤装' : p.category === 'skirt' ? '裙装' : p.category === 'outerwear' ? '外套' : '配饰'}</div>
        <div class="product-name">${p.name}</div>
        <div class="product-desc">${p.desc}</div>
        <div class="product-footer">
          <div>
            <div class="product-price">¥${p.price} <small>起</small></div>
            <div style="margin-top:4px;">${colorDots}${more}</div>
          </div>
          <button class="add-cart-btn" onclick="event.stopPropagation();quickAdd(${p.id})">加入</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function setCategory(id) {
  currentCategory = id;
  renderCategories();
  renderProducts();
}

function quickAdd(id) {
  const p = PRODUCTS.find(x => x.id === id);
  addToCart(id, p.colors[0], p.sizes[0], 1);
}

// ===== Detail Modal =====
function openDetail(id) {
  const p = PRODUCTS.find(x => x.id === id);
  if (!p) return;
  currentProduct = p;
  selectedColor = p.colors[0];
  selectedSize = p.sizes[0];
  document.getElementById('modalImg').src = p.img;
  document.getElementById('modalCategory').textContent = CATEGORIES.find(c=>c.id===p.category)?.label||'';
  document.getElementById('modalTitle').textContent = p.name;
  document.getElementById('modalPrice').textContent = `¥${p.price}`;
  document.getElementById('modalDesc').textContent = p.desc;

  const colorsEl = document.getElementById('modalColors');
  colorsEl.innerHTML = p.colors.map(c =>
    `<div class="color-dot${c === selectedColor ? ' selected' : ''}" style="background:${c};" onclick="selectColor('${c}')"></div>`
  ).join('');

  const sizesEl = document.getElementById('modalSizes');
  sizesEl.innerHTML = p.sizes.map(s =>
    `<button class="size-btn${s === selectedSize ? ' selected' : ''}" onclick="selectSize('${s}')">${s}</button>`
  ).join('');

  updateStockDisplay();
  document.getElementById('detailModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('open');
  document.body.style.overflow = '';
}

function selectColor(c) {
  selectedColor = c;
  document.querySelectorAll('#modalColors .color-dot').forEach(el => {
    el.classList.toggle('selected', el.style.backgroundColor === c || getComputedStyle(el).backgroundColor === rgbToHex(c));
  });
}

function selectSize(s) {
  selectedSize = s;
  document.querySelectorAll('#modalSizes .size-btn').forEach(el => {
    el.classList.toggle('selected', el.textContent === s);
  });
}

function updateStockDisplay() {
  const el = document.getElementById('modalStock');
  if (!currentProduct) return;
  const stock = currentProduct.stock;
  el.innerHTML = stock > 10
    ? `库存充足 <span class="ok">(${stock}件)</span>`
    : stock > 0
    ? `库存紧张 <span class="low">(仅剩${stock}件)</span>`
    : `<span class="low">暂时缺货</span>`;
}

function addFromModal() {
  if (!currentProduct) return;
  addToCart(currentProduct.id, selectedColor, selectedSize, 1);
}

// ===== Cart Drawer =====
function toggleCart() {
  const overlay = document.getElementById('cartOverlay');
  overlay.classList.toggle('open');
  document.body.style.overflow = overlay.classList.contains('open') ? 'hidden' : '';
  if (!overlay.classList.contains('open')) hideCheckout();
}

function renderCartItems() {
  const el = document.getElementById('cartItems');
  const empty = document.getElementById('cartEmpty');
  const footer = document.getElementById('cartFooter');
  if (cart.length === 0) {
    el.innerHTML = '';
    empty.style.display = 'block';
    footer.style.display = 'none';
    return;
  }
  empty.style.display = 'none';
  footer.style.display = 'block';
  el.innerHTML = cart.map((item, idx) => `
    <div class="cart-item">
      <img class="cart-item-img" src="${item.img}" alt="${item.name}">
      <div class="cart-item-info">
        <div class="cart-item-name">${item.name}</div>
        <div class="cart-item-spec">${item.color} · ${item.size}</div>
        <div class="cart-item-price">¥${item.price}</div>
        <div class="cart-item-actions">
          <button class="cart-qty-btn" onclick="updateCartQty(${idx}, -1)" ${item.qty <= 1 ? 'disabled' : ''}>−</button>
          <span class="cart-qty">${item.qty}</span>
          <button class="cart-qty-btn" onclick="updateCartQty(${idx}, 1)">+</button>
          <button class="cart-item-remove" onclick="removeCartItem(${idx})">🗑️</button>
        </div>
      </div>
    </div>
  `).join('');
  const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
  document.getElementById('cartTotal').textContent = `¥${total}`;
  document.getElementById('checkoutBtn').disabled = cart.length === 0;
}

// ===== Checkout =====
function showCheckout() {
  document.getElementById('checkoutBtn').style.display = 'none';
  document.querySelector('.cart-total').style.display = 'none';
  document.getElementById('checkoutForm').style.display = 'block';
  document.getElementById('checkoutAddr').value = '';
  document.getElementById('checkoutPhone').value = '';
  document.getElementById('checkoutNote').value = '';
  document.querySelectorAll('.form-group').forEach(g => g.classList.remove('invalid'));
}

function hideCheckout() {
  document.getElementById('checkoutBtn').style.display = 'block';
  document.querySelector('.cart-total').style.display = 'flex';
  document.getElementById('checkoutForm').style.display = 'none';
}

function submitOrder() {
  const addr = document.getElementById('checkoutAddr').value.trim();
  const phone = document.getElementById('checkoutPhone').value.trim();
  const note = document.getElementById('checkoutNote').value.trim();
  let valid = true;

  const addrGroup = document.getElementById('addrGroup');
  if (!addr || addr.length < 5) {
    addrGroup.classList.add('invalid'); valid = false;
  } else { addrGroup.classList.remove('invalid'); }

  const phoneGroup = document.getElementById('phoneGroup');
  if (!/^1\d{10}$/.test(phone)) {
    phoneGroup.classList.add('invalid'); valid = false;
  } else { phoneGroup.classList.remove('invalid'); }

  if (!valid) { showToast('请检查表单填写 ✏️'); return; }

  const total = cart.reduce((s,i) => s + i.price * i.qty, 0);
  const itemsSummary = cart.map(i => `${i.name} × ${i.qty}`).join('、');
  document.getElementById('successMsg').textContent =
    `订单总金额 ¥${total} · ${itemsSummary}\n收货地址：${addr}\n电话：${phone}${note ? ' · 备注：'+note : ''}`;
  document.getElementById('successModal').classList.add('open');
  cart = [];
  saveCart();
  hideCheckout();
  toggleCart();
}

function closeSuccessModal() {
  document.getElementById('successModal').classList.remove('open');
}

// ===== Toast =====
function showToast(msg) {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = msg;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

// ===== Utility =====
function rgbToHex(rgb) {
  if (rgb.startsWith('#')) return rgb.toLowerCase();
  const m = rgb.match(/\d+/g);
  if (!m) return rgb;
  return '#' + m.slice(0,3).map(x => parseInt(x).toString(16).padStart(2,'0')).join('');
}

// ===== Init =====
renderCategories();
renderProducts();
updateCartUI();

// Click outside modal to close
document.getElementById('detailModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
document.getElementById('successModal').addEventListener('click', function(e) {
  if (e.target === this) closeSuccessModal();
});
</script>
