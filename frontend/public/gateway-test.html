<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>坐山客 · 调试工具</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f0f14; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column;
  }
  header {
    padding: 10px 20px; background: #1a1a24; border-bottom: 1px solid #2a2a3a;
    display: flex; align-items: center; gap: 12px; flex-shrink: 0;
  }
  header h1 { font-size: 15px; font-weight: 600; color: #f0a030; }
  .badge {
    font-size: 11px; padding: 2px 8px; border-radius: 4px;
    background: #2a3a2a; color: #6f6; border: 1px solid #3a5a3a;
  }
  .badge.busy { background: #3a3a1a; color: #ff6; border-color: #5a5a2a; }
  .badge.err  { background: #3a1a1a; color: #f66; border-color: #5a2a2a; }
  .badge.wait { background: #1a2a3a; color: #6af; border-color: #2a4a6a; }
  .status-row {
    padding: 6px 20px; font-size: 12px; color: #888;
    display: flex; gap: 16px; flex-shrink: 0; border-bottom: 1px solid #1a1a24;
  }
  .chat-area {
    flex: 1; overflow-y: auto; padding: 12px 20px; display: flex;
    flex-direction: column; gap: 6px;
  }
  .msg { max-width: 85%; padding: 8px 12px; border-radius: 6px; line-height: 1.5; font-size: 14px; }
  .msg.user {
    align-self: flex-end; background: #1e3a5f; color: #cde;
    border-bottom-right-radius: 2px;
  }
  .msg.ai {
    align-self: flex-start; background: #1a1a24; color: #cdc;
    border-bottom-left-radius: 2px; border: 1px solid #2a2a3a;
  }
  .msg .meta {
    font-size: 11px; color: #666; margin-bottom: 4px;
    display: flex; gap: 8px; align-items: center;
  }
  .msg .meta .tag {
    padding: 1px 6px; border-radius: 3px; font-size: 10px;
  }
  .msg .meta .tag.local { background: #2a3a1a; color: #6a6; }
  .msg .meta .tag.deepseek { background: #1a2a3a; color: #6af; }
  .msg .meta .tag.scene { background: #3a2a1a; color: #fa6; }
  .msg .time { font-size: 11px; color: #555; margin-top: 4px; text-align: right; }
  .msg.ai p { margin: 0 0 4px; }
  .msg.ai p:last-child { margin-bottom: 0; }
  .msg.ai code { background: #2a2a3a; padding: 1px 5px; border-radius: 3px; font-size: 13px; }
  .msg.ai pre {
    background: #111; padding: 6px 10px; border-radius: 4px;
    overflow-x: auto; font-size: 13px; margin: 4px 0;
  }
  .msg.ai pre code { background: none; padding: 0; }
  .msg.ai ul, .msg.ai ol { padding-left: 18px; margin: 3px 0; }
  .msg.ai blockquote { border-left: 3px solid #3a4a3a; padding-left: 8px; color: #999; margin: 3px 0; }
  .msg.ai table { border-collapse: collapse; margin: 4px 0; font-size: 13px; }
  .msg.ai th, .msg.ai td { border: 1px solid #2a3a2a; padding: 3px 6px; }
  .msg.ai th { background: #1a2a1a; }
  .cursor { display: inline-block; width: 6px; height: 14px; background: #6f6; animation: blink .8s step-end infinite; vertical-align: text-bottom; }
  @keyframes blink { 50% { opacity: 0; } }
  .input-area {
    padding: 10px 20px; background: #1a1a24; border-top: 1px solid #2a2a3a;
    display: flex; gap: 8px; flex-shrink: 0;
  }
  .input-area textarea {
    flex: 1; resize: none; height: 40px; max-height: 100px;
    background: #222230; border: 1px solid #333345; border-radius: 6px;
    color: #e0e0e0; padding: 9px 12px; font-size: 14px;
    font-family: inherit; outline: none;
  }
  .input-area textarea:focus { border-color: #f0a030; }
  .input-area button {
    padding: 0 22px; border: none; border-radius: 6px;
    background: #f0a030; color: #111; font-weight: 600; font-size: 14px;
    cursor: pointer; white-space: nowrap; transition: .15s;
  }
  .input-area button:disabled { opacity: .4; cursor: not-allowed; }
  .input-area button:hover:not(:disabled) { background: #e8b040; }
  .empty-hint {
    flex: 1; display: flex; align-items: center; justify-content: center;
    color: #444; font-size: 13px; flex-direction: column; gap: 6px;
  }
</style>
</head>
<body>
<header>
  <h1>🛠 坐山客 · 调试工具</h1>
  <span class="badge" id="badge">初始化中...</span>
  <span style="font-size:12px;color:#666;margin-left:auto" id="channel-label"></span>
</header>
<div class="status-row">
  <span id="s-model">模型: -</span>
  <span id="s-route">路由: -</span>
  <span id="s-elapsed">耗时: -</span>
</div>
<div class="chat-area" id="chat-area">
  <div class="empty-hint">
    <div>⬇ 输入消息测试智能路由 & 工具调用</div>
    <div style="font-size:11px;color:#333">普通频道 · 流式 SSE · 自动获取/创建频道</div>
  </div>
</div>
<div class="input-area">
  <textarea id="input" placeholder="测试智能路由 / 工具调用..." rows="1"></textarea>
  <button id="send-btn">发送</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"></script>
<script>
marked.setOptions({ breaks: true, gfm: true });

const chatArea = document.getElementById('chat-area');
const input = document.getElementById('input');
const btn = document.getElementById('send-btn');
const badge = document.getElementById('badge');
const elModel = document.getElementById('s-model');
const elRoute = document.getElementById('s-route');
const elElapsed = document.getElementById('s-elapsed');
const elChannel = document.getElementById('channel-label');

let channelId = null;
let currentMsgDiv = null;
let startTime = 0;

function setBadge(text, cls = '') {
  badge.textContent = text;
  badge.className = 'badge' + (cls ? ' ' + cls : '');
}

function addUserMsg(text) {
  const hint = chatArea.querySelector('.empty-hint');
  if (hint) hint.remove();
  const div = document.createElement('div');
  div.className = 'msg user';
  div.textContent = text;
  const time = document.createElement('div');
  time.className = 'time';
  time.textContent = new Date().toLocaleTimeString();
  div.appendChild(time);
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function addAiMsg(modelTag, routeTag) {
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.innerHTML = `<div class="meta"><span class="tag ${modelTag}">${modelTag}</span><span class="tag ${routeTag}">${routeTag}</span></div><div class="content"></div>`;
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
  return div;
}

function appendToken(text) {
  if (!currentMsgDiv) return;
  const content = currentMsgDiv.querySelector('.content');
  // 删除末尾光标
  let cursor = content.querySelector('.cursor');
  if (cursor) cursor.remove();
  // 追加纯文本，然后用 marked 渲染
  content.textContent += text;
  content.innerHTML = marked.parse(content.textContent);
  // 重新添加光标
  const c = document.createElement('span');
  c.className = 'cursor';
  content.appendChild(c);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function finalizeMsg(extra) {
  if (!currentMsgDiv) return;
  const content = currentMsgDiv.querySelector('.content');
  const cursor = content.querySelector('.cursor');
  if (cursor) cursor.remove();
  content.innerHTML = marked.parse(content.textContent);
  // 时间戳
  const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
  const time = document.createElement('div');
  time.className = 'time';
  time.textContent = extra ? `${extra} · ${elapsed}s` : `${elapsed}s`;
  currentMsgDiv.appendChild(time);
  currentMsgDiv = null;
}

function scrollBottom() {
  chatArea.scrollTop = chatArea.scrollHeight;
}

input.addEventListener('input', () => {
  input.style.height = '40px';
  input.style.height = Math.min(input.scrollHeight, 100) + 'px';
});

input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

async function initChannel() {
  try {
    // 获取现有频道
    let resp = await fetch('/api/channels');
    let channels = await resp.json();
    // 找非默认频道（优先用"调试频道"）
    let ch = channels.find(c => c.name === '调试频道' || !c.is_default);
    if (!ch) {
      // 创建新频道
      let cr = await fetch('/api/channels', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({name: '调试频道'}),
      });
      ch = await cr.json();
    }
    channelId = ch.id;
    elChannel.textContent = `📺 ${ch.name} (${ch.id.slice(0,8)}...)`;
    setBadge('就绪');
  } catch (e) {
    setBadge('频道初始化失败', 'err');
    console.error(e);
  }
}

async function send() {
  const text = input.value.trim();
  if (!text || !channelId) return;

  input.value = '';
  input.style.height = '40px';
  btn.disabled = true;
  setBadge('生成中...', 'busy');

  addUserMsg(text);
  startTime = Date.now();
  elElapsed.textContent = '耗时: 0s';

  try {
    const resp = await fetch(`/api/channels/${channelId}/stream`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({content: text, channel: 'chat'}),
    });

    if (!resp.ok) {
      const errText = await resp.text();
      addAiMsg('err', 'err');
      appendToken(`**HTTP ${resp.status}**\n\n\`\`\`\n${errText.slice(0,300)}\n\`\`\``);
      finalizeMsg();
      setBadge('错误', 'err');
      btn.disabled = false;
      return;
    }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;

      buf += decoder.decode(value, {stream: true});
      const lines = buf.split('\n');
      buf = lines.pop() || '';

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const jsonStr = line.slice(6).trim();
        if (!jsonStr) continue;
        try {
          const evt = JSON.parse(jsonStr);
          handleEvent(evt);
        } catch(e) { /* skip malformed */ }
      }

      const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
      elElapsed.textContent = `耗时: ${elapsed}s`;
    }

  } catch (e) {
    if (!currentMsgDiv) addAiMsg('err', 'err');
    appendToken(`**连接错误**\n\n\`\`\`\n${e.message}\n\`\`\``);
    finalizeMsg();
    setBadge('连接失败', 'err');
  }

  btn.disabled = false;
  if (!currentMsgDiv) setBadge('就绪');
}

function handleEvent(evt) {
  switch (evt.event) {
    case 'user_msg':
      // 用户消息已保存，无需额外处理
      break;

    case 'model_info':
      elModel.textContent = `模型: ${evt.model || '?'}`;
      elRoute.textContent = `路由: ${evt.complexity || 'channel'}`;
      const modelTag = (evt.model || '').includes('DeepSeek') ? 'deepseek' : 'local';
      const routeTag = evt.complexity === 'heavy' ? 'deepseek' : 'local';
      currentMsgDiv = addAiMsg(modelTag, routeTag);
      break;

    case 'token':
      appendToken(evt.token);
      break;

    case 'done':
      finalizeMsg(`✅ ${evt.model || 'done'}`);
      elModel.textContent = `模型: ${evt.model || '?'}`;
      elElapsed.textContent = `耗时: ${((Date.now() - startTime) / 1000).toFixed(1)}s`;
      setBadge('就绪');
      break;

    case 'error':
      appendToken(`\n\n> ⚠️ ${evt.message}`);
      finalizeMsg('❌ error');
      setBadge('错误', 'err');
      break;
  }
}

// 启动
initChannel();
</script>
</body>
</html>
